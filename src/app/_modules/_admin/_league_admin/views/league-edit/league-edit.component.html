<div class="container mx-auto px-4 lg:px-8">
  <h1
    class="font-bold text-[32px] lg:text-[42px] font-bold pt-4 lg:pt-0 my-4 lg:my-8"
  >
    Ligaverwaltung
  </h1>

  <h2 class="text-[28px] lg:text-[32px] pt-4 lg:pt-0 my-4 lg:my-8">
    Bearbeiten einer Liga
  </h2>
</div>

<ng-container>
  <div class="bg-fb-gray-800 pt-4 lg:pt-8 pb-16">
    <div class="container mx-auto px-4 lg:px-8">
      <div
        class="grid grid-cols-1 md:grid-cols-1 xl:grid-cols-2 gap-[25px] mt-4 lg:mt-9"
      >
        <div *ngIf="league">
          <div class="bg-white my-[5px] py-[15px] px-[30px]">
            <div class="uppercase font-bold text-gray-400 text-sm mb-5">
              Hauptdaten
            </div>
            <div class="flex flex-col gap-2">
              <a
                class="block font-bold text-base truncate text-fb-gray-500 hover:text-black"
                [routerLink]="['/', 'blah', league.id]"
              >
                {{ league.name }} ({{ league.id }})
              </a>
              <div class="flex items-center mb-4">
                <a
                  class="font-bold text-black leading-[17px] text-sm px-5 py-2.5 mr-4 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
                  [routerLink]="[
                    '/',
                    'verwaltung',
                    'ligen',
                    league.id,
                    'bearbeiten'
                  ]"
                >
                  Liga bearbeiten
                </a>
                <a
                  class="font-bold text-white leading-[17px] text-sm px-5 py-2.5 border bg-red-400 hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
                  deactivated="true"
                  [routerLink]="[
                    '/',
                    'verwaltung',
                    'ligen',
                    league.id,
                    'bearbeiten'
                  ]"
                >
                  Liga löschen
                </a>
              </div>
            </div>
          </div>

          <div class="bg-white h-[57px] flex items-center justify-center">
            <a
              class="font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
              [routerLink]="['/', 'verwaltung', 'ligen', 'neu']"
            >
              Neue Liga anlegen
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>
