<div class="container mx-auto px-4 lg:px-8 my-6">
  <h1 class="font-bold text-[32px] mb-6">
    {{ isNew ? "Neue Prüfung" : "Prüfung bearbeiten" }}
  </h1>

  <div class="bg-white p-6 max-w-xl flex flex-col gap-4">
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium">Name *</label>
      <input
        class="border border-fb-gray-600 rounded px-3 py-2 text-sm"
        [(ngModel)]="test.name"
        name="name"
        placeholder="z.B. Regeltest N2 2025/26"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium">Lizenzstufe</label>
      <select
        class="border border-fb-gray-600 rounded px-3 py-2 text-sm"
        [(ngModel)]="test.lizenzstufe"
        name="lizenzstufe"
      >
        <option [ngValue]="null">– keine –</option>
        <option value="N3">N3</option>
        <option value="N2">N2</option>
        <option value="N1">N1</option>
      </select>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium">Zeitlimit (Minuten)</label>
      <input
        type="number"
        class="border border-fb-gray-600 rounded px-3 py-2 text-sm"
        [(ngModel)]="test.time_limit_minutes"
        name="time_limit_minutes"
        min="1"
        placeholder="z.B. 30 (leer = kein Limit)"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium">Max. Versuche</label>
      <input
        type="number"
        class="border border-fb-gray-600 rounded px-3 py-2 text-sm"
        [(ngModel)]="test.max_attempts"
        name="max_attempts"
        min="1"
        max="10"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium"
        >Bestanden bei max. Fehlerpunkten</label
      >
      <input
        type="number"
        class="border border-fb-gray-600 rounded px-3 py-2 text-sm"
        [(ngModel)]="test.pass_threshold_points"
        name="pass_threshold_points"
        min="0"
        placeholder="leer = keine Auswertung"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium">Deadline (Prüfungsphase endet)</label>
      <input
        type="datetime-local"
        class="border border-fb-gray-600 rounded px-3 py-2 text-sm"
        [(ngModel)]="test.deadline"
        name="deadline"
      />
    </div>

    @if (error) {
      <div class="text-red-600 text-sm">{{ error }}</div>
    }

    <div class="flex gap-3 mt-2">
      <fb-button (click)="save()" [disabled]="saving" icon="save">
        Speichern
      </fb-button>
      @if (!isNew && test.status === "draft") {
        <fb-button variant="success" (click)="publish()">
          Veröffentlichen
        </fb-button>
      }
      @if (!isNew) {
        <a
          [routerLink]="[
            '/verwaltung',
            'onlinepruefungen',
            test.id,
            'zuweisung',
          ]"
          class="font-bold text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px]"
          >SR zuweisen</a
        >
      }
    </div>
  </div>
</div>
