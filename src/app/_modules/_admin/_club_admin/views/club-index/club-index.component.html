<div class="container mx-auto px-4 lg:px-8">
  <h1
    class="font-bold text-[32px] lg:text-[42px] font-bold pt-4 lg:pt-0 my-4 lg:my-8"
  >
    Vereinsverwaltung
  </h1>
  <label
    class="flex items-center gap-2 text-sm font-medium cursor-pointer mb-4"
  >
    <input
      type="checkbox"
      [(ngModel)]="includeDeactivated"
      (change)="loadClubs()"
    />
    Deaktivierte Vereine anzeigen
  </label>
</div>

<ng-container>
  <div class="bg-fb-gray-800 pt-4 lg:pt-8 pb-16">
    <div class="container mx-auto px-4 lg:px-8">
      <div
        class="grid grid-cols-1 md:grid-cols-1 xl:grid-cols-2 gap-[25px] mt-4 lg:mt-9"
      >
        <ng-template #loading>
          <div class="bg-white my-[5px] py-[15px] px-[30px]">
            <div class="uppercase font-bold text-gray-400 text-sm mb-5">
              <svg
                class="inline mr-2 w-8 h-8 text-gray-200 animate-spin dark:text-gray-600 fill-gray-600 dark:fill-gray-300"
                viewBox="0 0 100 101"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                  fill="currentColor"
                />
                <path
                  d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                  fill="currentFill"
                />
              </svg>
              Daten werden geladen...
            </div>
          </div>
        </ng-template>

        <div *ngFor="let gameOperation of goClubItems$ | async; else: loading">
          <div class="bg-white flex items-center justify-center">
            <div
              class="h-[65px] my-2.5 lg:my-5 flex-1 px-[20px] flex justify-center"
            >
              <img
                *ngIf="gameOperation.logo_url"
                class="h-full max-w-full object-contain px-2"
                [src]="gameOperation.logo_url"
                [alt]="gameOperation.name"
              />
              <span
                *ngIf="!gameOperation.logo_url"
                class="self-center text-sm font-bold text-fb-gray-400"
                >{{ gameOperation.name }}</span
              >
            </div>
          </div>

          <div class="bg-white my-[5px] py-[15px] px-[30px]">
            <div class="uppercase font-bold text-gray-400 text-sm mb-5">
              Vereine
            </div>
            <div class="flex flex-col gap-2">
              <ng-container *ngFor="let club of gameOperation.clubs">
                <div [class.opacity-50]="club.deactivated_at">
                  <a
                    class="font-bold text-base truncate text-fb-gray-500 hover:text-black"
                  >
                    {{ club.name }} ({{ club.id }})
                    <span
                      *ngIf="club.deactivated_at"
                      class="ml-1 text-xs font-semibold px-1.5 py-0.5 rounded bg-red-100 text-red-700 normal-case"
                      >deaktiviert</span
                    >
                  </a>
                  <a
                    class="font-bold text-black leading-[17px] text-sm px-2 py-1.5 mr-4 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
                    [routerLink]="[
                      '/',
                      'verwaltung',
                      'vereine',
                      club.id,
                      'bearbeiten'
                    ]"
                  >
                    bearbeiten
                  </a>
                  <a
                    class="font-bold text-black leading-[17px] text-sm px-2 py-1.5 mr-4 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
                    [routerLink]="[
                      '/',
                      'verwaltung',
                      'vereine',
                      club.id,
                      'spieler'
                    ]"
                  >
                    Spieler bearbeiten
                  </a>
                  <fb-confirmation
                    *ngIf="club.deactivated_at && canDeleteClubs"
                    title="Verein dauerhaft löschen"
                    content="Soll dieser Verein wirklich dauerhaft gelöscht werden? Diese Aktion kann nicht rückgängig gemacht werden."
                    submitButtonTitle="Endgültig löschen"
                    buttonVariant="error"
                    (handleSubmit)="deleteClub(club.id)"
                  >
                    <button
                      class="font-bold text-red-700 leading-[17px] text-sm px-2 py-1.5 mr-4 border bg-white hover:bg-red-50 border-red-300 rounded-[5px] cursor-pointer"
                    >
                      löschen
                    </button>
                  </fb-confirmation>
                </div>
              </ng-container>

              <p
                class="block font-bold text-base truncate text-fb-gray-500 hover:text-black"
                *ngIf="gameOperation.clubs.length === 0"
              >
                noch kein Verein hinterlegt
              </p>
            </div>
          </div>

          <div class="bg-white h-[57px] flex items-center justify-center">
            <a
              class="font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
              [routerLink]="['/', 'verwaltung', 'vereine', 'neu']"
            >
              Neuen Verein anlegen
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>
