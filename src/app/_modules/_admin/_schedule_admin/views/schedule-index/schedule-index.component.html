<div class="container mx-auto px-4 lg:px-8">
  <h1
    class="font-bold text-[32px] lg:text-[42px] font-bold pt-4 lg:pt-0 my-4 lg:my-8"
  >
    Spielplanverwaltung
  </h1>
</div>

<div class="bg-fb-gray-800 pt-4 lg:pt-8 pb-16">
  <div class="container mx-auto px-4 lg:px-8">
    <div class="grid gap-[25px] mt-4 lg:mt-9">
      <div>
        <a
          class="inline-flex items-center font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
          [routerLink]="[
            '/',
            'verwaltung',
            'ligen',
            leagueId,
            'spieltag',
            'neu'
          ]"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-4 h-4 md:mr-3"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 4.5v15m7.5-7.5h-15"
            />
          </svg>
          <span> Neuen Spieltag anlegen </span>
        </a>
      </div>

      <ng-container *ngIf="loading || !arenas.length">
        <div class="bg-white my-[5px] py-[15px] px-[30px]">
          <div class="uppercase font-bold text-gray-400 text-sm mb-5">
            <svg
              class="inline mr-2 w-8 h-8 text-gray-200 animate-spin dark:text-gray-600 fill-gray-600 dark:fill-gray-300"
              viewBox="0 0 100 101"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                fill="currentColor"
              />
              <path
                d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                fill="currentFill"
              />
            </svg>
            Spielplan wird geladen...
          </div>
        </div>
      </ng-container>
      <ng-container *ngIf="!loading && gameDays.length === 0">
        <div class="bg-white my-[5px] py-[15px] px-[30px]">
          <div class="uppercase font-bold text-gray-400 text-sm mb-5">
            Es sind noch keine Spieltage hinterlegt
          </div>
        </div>
      </ng-container>
      <ng-container *ngIf="!loading && gameDays.length">
        <div *ngFor="let gameDay of gameDays">
          <div class="bg-white md:h-[80px]">
            <div class="flex my-2.5 lg:my-5 px-[30px] py-[20px]">
              <div>
                <div class="uppercase font-bold text-gray-400 text-sm">
                  Spieltag {{ gameDay.number }},
                  {{ gameDay.date | date: "dd.MM.YYYY" }}
                </div>
                <div
                  class="text-gray-400 text-sm"
                  *ngIf="gameDay.arena as arena"
                >
                  {{ arena.city }}, {{ arena.name }} ({{ arena.id }})
                </div>
              </div>
              <a
                class="flex items-center font-bold text-black leading-[17px] text-sm px-5 py-2.5 ml-auto border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
                [routerLink]="[
                  '/',
                  'verwaltung',
                  'ligen',
                  leagueId,
                  'spieltag',
                  gameDay.id,
                  'bearbeiten'
                ]"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="w-4 h-4 md:mr-3"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125"
                  />
                </svg>
                <span class="hidden md:inline"> Spieltag bearbeiten </span>
              </a>
            </div>
          </div>

          <div class="bg-white my-[5px] py-[15px]" *ngIf="gameDay.games.length">
            <div
              class="uppercase font-bold text-gray-400 text-sm mb-5 px-[30px]"
            >
              Spiele
            </div>
            <div class="grid gap-2">
              <ng-container
                *ngFor="
                  let game of gameDay.games;
                  let first = first;
                  let index = index
                "
              >
                <fb-game-edit
                  class="px-[30px] py-1 odd:bg-fb-gray-300"
                  [ngClass]="{ 'bg-gray-100': index % 2 === 1 }"
                  [first]="first"
                  [existingGame]="game"
                  [gameDayId]="gameDay.id"
                  [teams]="teams"
                  [clubs]="clubs"
                  [arenas]="arenas"
                  [allGameDays]="gameDays"
                  (refreshSchedule)="getSchdule(leagueId)"
                ></fb-game-edit>
              </ng-container>
              <!--              <table>-->
              <!--                <tr>-->
              <!--                  <td># Anpfiff</td>-->
              <!--                  <td>Heim</td>-->
              <!--                  <td>Gast</td>-->
              <!--                  <td>Schirians.</td>-->
              <!--                </tr>-->
              <!--                <tr *ngFor="let game of gameDay.games">-->
              <!--                  <td>{{ game.game_number }}, {{ game.start_time }}</td>-->
              <!--                  <td>{{ game.home_team_name }}</td>-->
              <!--                  <td>{{ game.guest_team_name }}</td>-->
              <!--                  <td>{{ game.nominated_referees }}</td>-->
              <!--                </tr>-->
              <!--              </table>-->
            </div>
          </div>

          <div class="bg-white my-[5px] px-[30px] py-[20px]">
            <button
              (click)="toggleNewGame(gameDay.id)"
              class="flex uppercase font-bold text-gray-400 text-sm"
              [ngClass]="{ 'mb-5': newGameOpen.includes(gameDay.id) }"
            >
              <span> Neues Spiel hinzufügen </span>

              <span>
                <svg
                  *ngIf="!newGameOpen.includes(gameDay.id)"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="ml-2 w-5 h-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M19.5 8.25l-7.5 7.5-7.5-7.5"
                  />
                </svg>

                <svg
                  *ngIf="newGameOpen.includes(gameDay.id)"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="ml-2 w-5 h-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M4.5 15.75l7.5-7.5 7.5 7.5"
                  />
                </svg>
              </span>
            </button>
            <fb-game-edit
              *ngIf="newGameOpen.includes(gameDay.id)"
              [first]="true"
              [gameDayId]="gameDay.id"
              [teams]="teams"
              [clubs]="clubs"
              [arenas]="arenas"
              (refreshSchedule)="getSchdule(leagueId)"
            ></fb-game-edit>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>
