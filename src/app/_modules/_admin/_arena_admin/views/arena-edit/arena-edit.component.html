<div class="p-4 lg:p-8 max-w-xl">
  <div class="flex items-center gap-3 mb-6">
    <a
      [routerLink]="['/', 'verwaltung', 'spielorte']"
      class="text-fb-gray-500 hover:text-black text-sm"
    >
      ← Spielorte
    </a>
    <h1 class="text-2xl font-bold">
      {{ isNew ? "Neuen Spielort anlegen" : "Spielort bearbeiten" }}
    </h1>
  </div>

  <form (ngSubmit)="submit()" #arenaForm="ngForm">
    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">
        Name <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        class="w-full p-2 border border-fb-gray-600 rounded-[5px] bg-white"
        [(ngModel)]="name"
        name="name"
        required
        placeholder="z.B. Sporthalle Musterstadt"
      />
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">
        Stadt <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        class="w-full p-2 border border-fb-gray-600 rounded-[5px] bg-white"
        [(ngModel)]="city"
        name="city"
        required
        placeholder="z.B. Berlin"
      />
    </div>

    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="col-span-2">
        <label class="block text-sm font-medium mb-1">Straße</label>
        <input
          type="text"
          class="w-full p-2 border border-fb-gray-600 rounded-[5px] bg-white"
          [(ngModel)]="street"
          name="street"
          placeholder="Musterstraße"
        />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Hausnummer</label>
        <input
          type="text"
          class="w-full p-2 border border-fb-gray-600 rounded-[5px] bg-white"
          [(ngModel)]="housenumber"
          name="housenumber"
          placeholder="12a"
        />
      </div>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium mb-1">PLZ</label>
      <input
        type="text"
        class="w-full p-2 border border-fb-gray-600 rounded-[5px] bg-white"
        [(ngModel)]="postcode"
        name="postcode"
        placeholder="10115"
      />
    </div>

    <div *ngIf="!isNew" class="mb-6 flex items-center gap-3">
      <input
        type="checkbox"
        id="disabled"
        [(ngModel)]="disabled"
        name="disabled"
        class="w-4 h-4"
      />
      <label for="disabled" class="text-sm">Spielort deaktivieren</label>
    </div>

    <div
      *ngIf="duplicateWarning"
      class="bg-white border border-yellow-700 rounded p-4 mb-4"
    >
      <p class="text-sm font-medium mb-2">
        Möglicherweise existiert bereits ein Spielort an dieser Adresse:
      </p>
      <ul class="text-xs text-fb-gray-400 mb-3 space-y-1">
        <li *ngFor="let d of duplicates">
          <span class="font-medium text-white">{{ d.name }}</span>
          – {{ d.city
          }}<span *ngIf="d.street">, {{ d.street }} {{ d.housenumber }}</span>
        </li>
      </ul>
      <div class="flex gap-3">
        <button
          type="button"
          (click)="submit(true)"
          class="text-sm bg-yellow-700 hover:bg-yellow-600 text-white px-3 py-1.5 rounded"
        >
          Trotzdem anlegen
        </button>
        <button
          type="button"
          (click)="duplicateWarning = false"
          class="text-sm border border-fb-gray-600 hover:border-fb-gray-400 px-3 py-1.5 rounded"
        >
          Abbrechen
        </button>
      </div>
    </div>

    <div *ngIf="!duplicateWarning" class="flex gap-3">
      <button
        type="submit"
        [disabled]="saving || arenaForm.invalid"
        class="text-sm bg-fb-gray-800 hover:bg-fb-gray-700 disabled:opacity-50 px-4 py-2 rounded"
      >
        {{ saving ? "Wird gespeichert…" : "Speichern" }}
      </button>
      <a
        [routerLink]="['/', 'verwaltung', 'spielorte']"
        class="text-sm border border-fb-gray-600 hover:border-fb-gray-400 px-4 py-2 rounded"
      >
        Abbrechen
      </a>
    </div>
  </form>
</div>
