<div class="container h-full mx-auto px-4 lg:px-8">
  <div class="h-full w-full flex flex-col justify-center items-center">
    <h1
      class="font-bold text-center text-[32px] lg:text-[42px] font-bold my-4 lg:my-8"
    >
      Saisonmanager-Login
    </h1>

    <p class="font-bold text-center mb-4 text-red-600">
      Mit dem Sommer-Update 2026 wurde eine Vielzahl an Verbesserungen
      umgesetzt. Wenn etwas noch nicht klappt oder ihr auf einen Fehler stoßt,
      meldet ihn bitte (ggf. auch mit Screenshot) an
      <a href="mailto:d.kehne@floorball.de" class="underline"
        >d.kehne@floorball.de</a
      >.
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="loginSubmit(loginForm.value)">
      <div class="flex flex-col">
        <label for="username" class="font-medium text-base text-fb-gray-500"
          >Benutzername</label
        >
        <input
          type="text"
          id="username"
          autocomplete="username"
          class="outline-none text-fb-gray-500 box-shadow-none w-full md:w-[260px] h-11 p-2 border border-fb-gray-400 focus-visible:border-fb-gray-900 hover:border-fb-gray-900 transition rounded text-base"
          [formControl]="loginForm.controls.username"
        />
      </div>

      <div class="flex flex-col mb-4">
        <label for="password" class="font-medium text-base text-fb-gray-500"
          >Passwort</label
        >
        <input
          type="password"
          id="password"
          autocomplete="current-password"
          class="outline-none text-fb-gray-500 box-shadow-none w-full md:w-[260px] h-11 p-2 border border-fb-gray-400 focus-visible:border-fb-gray-900 hover:border-fb-gray-900 transition rounded text-base"
          [formControl]="loginForm.controls.password"
        />
      </div>

      <div class="flex flex-col mt-6">
        <button
          class="w-[150px] mx-auto font-bold text-black leading-[17px] text-sm px-2.5 md:px-5 py-1.5 md:py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px]"
        >
          Login
        </button>
      </div>

      <div class="flex flex-col mt-6">
        <button
          (click)="lostPassword(loginForm.value); (false)"
          class="text-fb-gray-500 hover:text-black text-base text-center"
        >
          Passwort vergessen
        </button>
      </div>
    </form>
  </div>
</div>
