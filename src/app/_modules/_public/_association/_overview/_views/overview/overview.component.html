<ng-container *ngIf="selectedLeague$ | async as selectedLeague">
  <div
    class="container mx-auto px-4 lg:px-8"
    *ngIf="selectedLeague.league_type === 'league'"
  >
    <div class="xl:grid xl:grid-cols-5">
      <div class="flex items-center justify-between mt-4 lg:mt-8 xl:col-span-3">
        <h2 class="font-bold text-xl lg:text-2xl">
          <ng-container
            *ngIf="
              selectedMatchDay?.game_day_number === currentMatchDayNumber;
              else gameDayTitle
            "
          >
            Aktueller Spieltag
          </ng-container>
          <ng-template #gameDayTitle>
            <ng-container *ngIf="matches$ | async as matches">
              {{ selectedMatchDayMinDate | date: "dd.MM.yyyy" }}
              <ng-container
                *ngIf="
                  (selectedMatchDayMinDate | date: 'dd.MM.yyyy') !==
                  (selectedMatchDayMaxDate | date: 'dd.MM.yyyy')
                "
              >
                -
                {{ selectedMatchDayMaxDate | date: "dd.MM.yyyy" }}</ng-container
              >
            </ng-container>
          </ng-template>
        </h2>
        <div
          *ngIf="matches$ | async as matches"
          class="flex items-center ml-auto"
        >
          <fb-button
            size="small"
            (handleClick)="
              selectMatchDay((matches[0]?.game_day || 0) - 1, selectedLeague)
            "
            [disabled]="(matches[0]?.game_day || 0) - 1 <= 0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 19.5L8.25 12l7.5-7.5"
              />
            </svg>
          </fb-button>
          <span
            class="font-bold text-fb-gray-400 text-base mx-2"
            *ngIf="matches.length && matches[0]"
            >{{ matches[0]?.game_day }}. Spieltag</span
          >
          <fb-button
            size="small"
            (handleClick)="
              selectMatchDay((matches[0]?.game_day || 0) + 1, selectedLeague)
            "
            [disabled]="(matches[0]?.game_day || 0) + 1 > maxGamedayNumber"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8.25 4.5l7.5 7.5-7.5 7.5"
              />
            </svg>
          </fb-button>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-5 mt-4 lg:mt-8 gap-8">
      <div class="xl:col-span-3">
        <ng-container *ngIf="matches$ | async as matches; else loadingMatches">
          <fb-match-pairing-list
            *ngIf="matches.length; else noMatchesMessage"
            [matches]="matches"
          ></fb-match-pairing-list>

          <ng-template #noMatchesMessage>
            <div class="text-center text-fb-gray-400 my-12">
              Noch keine Spiele für diesen Spieltag
            </div>
          </ng-template>

          <div class="mt-5 flex items-center justify-end">
            <a
              [routerLink]="['./', 'all-matches']"
              class="inline-block text-center font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-800 border-fb-gray-600 rounded-[5px] cursor-pointer"
            >
              Alle Anzeigen
            </a>
          </div>
        </ng-container>

        <ng-template #loadingMatches>
          <fb-skeleton-match-pairing-list></fb-skeleton-match-pairing-list>
        </ng-template>
      </div>

      <div class="xl:col-span-2">
        <ng-container
          *ngIf="
            teamRankings$ | async as teamRankings;
            else loadingTeamRankings
          "
        >
          <ng-container *ngIf="teamRankings.length; else noTeamRankingsMessage">
            <fb-team-ranking-table
              type="small"
              [data]="teamRankings"
              class="hidden xl:block"
            ></fb-team-ranking-table>
            <fb-team-ranking-table
              [data]="teamRankings"
              class="xl:hidden"
            ></fb-team-ranking-table>
          </ng-container>

          <ng-template #noTeamRankingsMessage>
            <div class="text-center text-fb-gray-400 my-12">
              Noch keine Tabelle vorhanden
            </div>
          </ng-template>
        </ng-container>

        <ng-template #loadingTeamRankings>
          <fb-skeleton-table type="small"></fb-skeleton-table>
        </ng-template>
      </div>
    </div>
  </div>

  <fb-matches-with-rounds
    *ngIf="selectedLeague.league_type === 'cup'"
  ></fb-matches-with-rounds>

  <div class="mt-6 lg:mt-12 border-b-[10px] border-fb-gray-200 pb-5">
    <div class="container mx-auto px-4 lg:px-8">
      <h2 class="font-bold text-xl lg:text-2xl mb-4 lg:mb-8">Top 10 Scorer</h2>
      <ng-container
        *ngIf="
          playerRankings$ | async as playerRankings;
          else loadingPlayerRankings
        "
      >
        <fb-player-ranking-table
          *ngIf="playerRankings.length; else noRankingsMessage"
          [data]="playerRankings.slice(0, 10)"
        ></fb-player-ranking-table>

        <ng-template #noRankingsMessage>
          <div class="text-center text-fb-gray-400 my-12">
            Noch keine Scorer vorhanden
          </div>
        </ng-template>
      </ng-container>

      <ng-template #loadingPlayerRankings>
        <fb-skeleton-table></fb-skeleton-table>
      </ng-template>
    </div>
  </div>

  <div class="mt-5 lg:mt-10 pb-2.5 lg:pb-16">
    <div class="container mx-auto px-8">
      <ng-container *ngIf="singleLeague$ | async as singleLeague">
        <ng-container
          *ngIf="selectedAssociation$ | async as selectedAssociation"
        >
          <fb-similar-leagues
            [leagues]="
              singleLeague.similar_leagues
                ? singleLeague.similar_leagues
                : selectedAssociation.top_leagues
            "
          ></fb-similar-leagues>
        </ng-container>
      </ng-container>
    </div>
  </div>
</ng-container>
