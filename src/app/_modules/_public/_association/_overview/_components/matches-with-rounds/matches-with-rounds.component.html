<ng-container *ngIf="selectedLeague$ | async as selectedLeague">
  <div class="container mx-auto px-4 lg:px-8">
    <ul
      class="flex gap-1 items-center text-xl lg:text-2xl font-bold my-4 lg:my-8"
    >
      <li class="mr-2">Runde</li>
      <li *ngFor="let round of selectedLeague.game_day_numbers">
        <button
          class="transition hover:bg-fb-gray-200 rounded px-2"
          [ngClass]="{ 'bg-fb-gray-200': round === selectedMatchDay }"
          (click)="selectMatchDay(round, selectedLeague.id)"
        >
          {{ round }}
        </button>
      </li>
    </ul>

    <ng-container *ngIf="matches$ | async as matches">
      <fb-match-encounter-list [matches]="matches"></fb-match-encounter-list>
    </ng-container>
  </div>
</ng-container>
