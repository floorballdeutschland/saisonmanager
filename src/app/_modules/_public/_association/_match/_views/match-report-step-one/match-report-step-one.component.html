<div class="container mx-auto px-4 pb-8 lg:px-8 mt-4 lg:mt-8">
  <h2 class="font-bold text-xl lg:text-2xl">Aufstellung</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4 lg:mt-8">
    <div>
      <h3 class="font-bold mb-4">{{ game.home_team_name }}</h3>

      <div class="grid grid-cols-1 gap-2 mb-4">
        <div *ngIf="false">
          <fb-button (click)="openSquadHistoryHomeDialog()">
            Kaderliste laden
          </fb-button>
        </div>
        <div>
          <fb-button (handleClick)="openAddHomeDialog()">
            Kader bearbeiten
          </fb-button>
        </div>
      </div>

      <fb-team-lineup [lineup]="game.players.home || []"></fb-team-lineup>
    </div>

    <div>
      <h3 class="font-bold mb-4">{{ game.guest_team_name }}</h3>

      <div class="grid grid-cols-1 gap-2 mb-4">
        <div *ngIf="false">
          <fb-button (click)="openSquadHistoryGuestDialog()">
            Kaderliste laden
          </fb-button>
        </div>
        <div>
          <fb-button (handleClick)="openAddGuestDialog()">
            Kader bearbeiten
          </fb-button>
        </div>
      </div>

      <fb-team-lineup [lineup]="game.players.guest || []"></fb-team-lineup>
    </div>
  </div>

  <ng-container *ngIf="addDialogOpen !== ''">
    <fb-team-squad
      (handleClose)="closeAddDialog()"
      [side]="addDialogOpen"
      [teamId]="
        addDialogOpen === 'guest' ? game.guest_team_id : game.home_team_id
      "
      [team]="
        addDialogOpen === 'guest' ? game.guest_team_name : game.home_team_name
      "
      [players]="
        addDialogOpen === 'guest'
          ? game.players.guest || []
          : game.players.home || []
      "
    ></fb-team-squad>
  </ng-container>

  <ng-container *ngIf="squadHistoryDialogOpen !== ''">
    <fb-team-squad-history
      (handleClose)="closeSquadHistoryDialog()"
      [team]="
        addDialogOpen === 'guest' ? game.guest_team_name : game.home_team_name
      "
    ></fb-team-squad-history>
  </ng-container>

  <!-- <fb-player-lineup-dialog></fb-player-lineup-dialog>-->
</div>

<div class="border-b-4 border-fb-gray-200">
  <div class="container mx-auto px-4 pb-8 lg:px-8 mt-4 lg:mt-8">
    <h2 class="font-bold text-xl lg:text-2xl">Betreuer</h2>

    <div class="grid md:grid-cols-2 gap-4 mt-4 lg:mt-8">
      <div class="grid gap-4">
        <p class="font-bold">{{ game.home_team_name }}</p>
        <fb-match-event-form
          *ngFor="let num of [1, 2, 3, 4, 5]"
          [type]="'coach' + num"
          team="home"
          (updateGame)="reloadGame()"
          (updatePeriod)="(null)"
          [match]="game"
          [additionalFields]="additionalFields"
        ></fb-match-event-form>
      </div>
      <div class="grid gap-4">
        <p class="font-bold">{{ game.guest_team_name }}</p>
        <fb-match-event-form
          *ngFor="let num of [1, 2, 3, 4, 5]"
          [type]="'coach' + num"
          team="guest"
          (updateGame)="reloadGame()"
          (updatePeriod)="(null)"
          [match]="game"
          [additionalFields]="additionalFields"
        ></fb-match-event-form>
      </div>
    </div>
  </div>
</div>

<div class="border-b-4 border-fb-gray-200">
  <div class="container mx-auto px-4 pb-8 lg:px-8 mt-4 lg:mt-8">
    <h2 class="font-bold text-xl lg:text-2xl">Spielinformationen</h2>

    <div
      class="grid md:grid-cols-2 gap-4 mt-4 lg:mt-8"
      *ngIf="additionalFields; else loading"
    >
      <div class="md:col-span-2">
        <fb-match-event-form
          type="livestream"
          team="both"
          [fieldValue]="game.live_stream_link || ''"
          (updateGame)="reloadGame()"
          (updatePeriod)="(null)"
          [match]="game"
        ></fb-match-event-form>
      </div>

      <div class="md:col-span-2">
        <fb-match-event-form
          type="vodstream"
          team="both"
          [fieldValue]="game.vod_link || ''"
          (updateGame)="reloadGame()"
          (updatePeriod)="(null)"
          [match]="game"
        ></fb-match-event-form>
      </div>

      <div>
        <fb-match-event-form
          type="recordkeeper"
          team="both"
          [fieldValue]="additionalFields?.record_keeper_string || ''"
          (updateGame)="reloadGame()"
          (updatePeriod)="(null)"
          [match]="game"
        ></fb-match-event-form>
      </div>

      <div>
        <fb-match-event-form
          type="timekeeper"
          team="both"
          [fieldValue]="additionalFields?.time_keeper_string || ''"
          (updateGame)="reloadGame()"
          (updatePeriod)="(null)"
          [match]="game"
        ></fb-match-event-form>
      </div>
    </div>
  </div>
</div>

<div class="border-b-4 border-fb-gray-200">
  <div class="container mx-auto px-4 pb-8 lg:px-8 mt-4 lg:mt-8">
    <h2 class="font-bold text-xl lg:text-2xl">Schiedsrichter</h2>

    <div
      class="grid md:grid-cols-2 gap-4 mt-4 lg:mt-8"
      *ngIf="additionalFields; else loading"
    >
      <div>
        <fb-match-event-form
          type="referee1"
          team="both"
          (updateGame)="reloadGame()"
          (updatePeriod)="(null)"
          [match]="game"
        ></fb-match-event-form>
      </div>
      <div>
        <fb-match-event-form
          type="referee2"
          team="both"
          (updateGame)="reloadGame()"
          (updatePeriod)="(null)"
          [match]="game"
        ></fb-match-event-form>
      </div>
    </div>
  </div>
</div>

<div class="border-b-4 border-fb-gray-200">
  <div class="container mx-auto px-4 pb-8 lg:px-8 mt-4 lg:mt-8">
    <div class="my-4">
      <fb-button
        (handleClick)="startEvents()"
        [fullWidth]="true"
        [variant]="'success'"
        [size]="'large'"
      >
        Weiter zur Ereigniseingabe
      </fb-button>
    </div>
  </div>
</div>
