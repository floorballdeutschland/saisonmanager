<ng-container *ngIf="match$ | async as match">
  <fb-header
    headline="Spieledetails"
    type="match"
    [subline]="match.home_team_name + ' vs. ' + match.guest_team_name"
  ></fb-header>

  <div class="container mx-auto px-8 mt-8">
    <div>
      <h2 class="font-bold text-2xl mb-8">Spielverlauf</h2>
      <fb-match-history [gameEvents]="match.events"></fb-match-history>
    </div>

    <div class="mt-8">
      <h2 class="font-bold text-2xl">Aufstellung</h2>
      <div class="grid grid-cols-2 gap-8 mt-8">
        <div>
          <h3 class="font-bold mb-8">{{ match.home_team_name }}</h3>
          <fb-team-lineup [lineup]="match.players.home"></fb-team-lineup>
        </div>

        <div>
          <h3 class="font-bold mb-8">{{ match.guest_team_name }}</h3>
          <fb-team-lineup [lineup]="match.players.guest"></fb-team-lineup>
        </div>
      </div>
    </div>
  </div>

  <pre>{{ match | json }}</pre>
</ng-container>
