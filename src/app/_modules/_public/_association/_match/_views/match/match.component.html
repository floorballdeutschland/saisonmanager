<ng-container *ngIf="match$ | async as match">
  <fb-header
    headline="Spieledetails"
    type="match"
    [subline]="match.home_team_name + ' vs. ' + match.guest_team_name"
  ></fb-header>

  <fb-match-header [game]="match"></fb-match-header>

  <div class="container mx-auto px-4 lg:px-8 mt-4 lg:mt-8">
    <div>
      <h2 class="font-bold text-xl lg:text-2xl mb-4 lg:mb-8">Spielverlauf</h2>
      <fb-match-history [match]="match"></fb-match-history>
    </div>

    <div class="mt-8">
      <h2 class="font-bold text-xl lg:text-2xl">Aufstellung</h2>
      <div class="grid grid-cols-2 gap-8 mt-8">
        <div>
          <h3 class="font-bold mb-4 lg:mb-8">{{ match.home_team_name }}</h3>
          <fb-team-lineup [lineup]="match.players.home"></fb-team-lineup>
        </div>

        <div>
          <h3 class="font-bold mb-4 lg:mb-8">{{ match.guest_team_name }}</h3>
          <fb-team-lineup [lineup]="match.players.guest"></fb-team-lineup>
        </div>
      </div>
    </div>

    <div class="mt-8">
      <h2 class="font-bold text-xl lg:text-2xl mb-4 lg:mb-8">Weiteres</h2>
      <h3 class="text-black font-bold text-base">Spielinfos</h3>
      <div class="grid grid-cols-2 gap-8 mt-4 lg:mt-8">
        <fb-match-info [game]="match"></fb-match-info>
      </div>
    </div>
  </div>
</ng-container>
