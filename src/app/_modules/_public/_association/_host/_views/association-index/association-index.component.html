<div class="container mx-auto px-4 lg:px-8">
  <h1
    class="font-bold text-[32px] lg:text-[42px] font-bold pt-4 lg:pt-0 my-4 lg:my-8"
  >
    Saisonmanager
  </h1>
</div>

<div class="bg-fb-gray-800 pt-4 lg:pt-8 pb-16">
  <div class="container mx-auto px-4 lg:px-8">
    <ng-container *ngIf="selectedAssociation$ | async as selectedAssociation">
      <h2 class="font-bold text-xl lg:text-2xl">
        {{ selectedAssociation.name }}
      </h2>

      <nav *ngIf="leagues$ | async as leagues">
        <div class="grid grid-cols-1 gap-[25px] mt-4 lg:mt-9">
          <div *ngFor="let item of leagues">
            <div class="flex bg-white h-[57px] px-[20px]">
              <div class="mt-4 mb-4">
                <a
                  [routerLinkActive]="'!text-black'"
                  [routerLink]="[
                    '/',
                    selectedAssociation.path,
                    item | normalizeLeagueRoute
                  ]"
                  class="font-bold text-fb-gray-500 hover:text-black text-base"
                  title="{{ item.name }}"
                  >{{ item.name }}</a
                >
              </div>
            </div>

            <div class="flex bg-white my-[5px] py-[15px] px-[20px] gap-2">
              <a
                [routerLink]="[
                  '/',
                  selectedAssociation.path,
                  item | normalizeLeagueRoute
                ]"
                class="font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
                >Zur Liga</a
              >
              <a
                [routerLink]="[
                  '/',
                  selectedAssociation.path,
                  item | normalizeLeagueRoute,
                  'tabelle'
                ]"
                class="font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
                >Tabelle</a
              >
              <a
                [routerLink]="[
                  '/',
                  selectedAssociation.path,
                  item | normalizeLeagueRoute,
                  'scorer'
                ]"
                class="font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
                >Scorrer</a
              >
            </div>
          </div>
        </div>
      </nav>
    </ng-container>
  </div>
</div>
