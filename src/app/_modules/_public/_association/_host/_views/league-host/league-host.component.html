<ng-container
  *ngIf="selectedLeague$ && selectedLeague$ | async as selectedLeague"
>
  <fb-header
    [headline]="selectedLeague.name"
    type="league"
    [subline]="selectedLeague.short_name"
  ></fb-header>

  <div class="container mx-auto px-8">
    <div class="h-[80px] flex items-center gap-[25px]">
      <fb-tab-item
        [isActive]="true"
        [link]="['./', selectedLeague.id.toString()]"
        >Übersicht</fb-tab-item
      >
      <fb-tab-item [link]="['./', selectedLeague.id.toString(), 'tabelle']"
        >Tabelle</fb-tab-item
      >
      <fb-tab-item [link]="['./', selectedLeague.id.toString(), 'scorer']"
        >Scorer</fb-tab-item
      >
    </div>
  </div>

  <router-outlet></router-outlet>
</ng-container>
