<ng-container *ngIf="selectedLeague$ | async as selectedLeague">
  <ng-container *ngIf="selectedAssociation$ | async as selectedAssociation">
    <ng-container *ngIf="matches$ | async as matches; else loadingNextMatches">
      <fb-next-match-list [matches]="matches"></fb-next-match-list>
    </ng-container>

    <ng-template #loadingNextMatches>
      <fb-skeleton-next-match-list></fb-skeleton-next-match-list>
    </ng-template>

    <div *ngIf="displayAssociationHeader$ | async">
      <ng-container *ngIf="selectedSeason$ | async as season">
        <fb-header
          [headline]="selectedLeague.name"
          type="league"
          [subline]="season.name"
          [isMarkedAsFavorite]="isLeagueFavorite(selectedLeague.id)"
          (markAsFavorite)="addToFavorites(selectedLeague)"
          (removeFromFavorites)="removeFavorite(selectedLeague.id)"
        ></fb-header>
      </ng-container>

      @if (selectedLeague.banner_url) {
      <div class="container mx-auto px-4 lg:px-8 py-3">
        @if (safeBannerLink(selectedLeague.banner_link_url); as link) {
        <a
          [href]="link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Werbung – externer Link öffnet in neuem Tab"
        >
          <img
            [src]="selectedLeague.banner_url"
            alt="Anzeige"
            class="w-full"
            style="aspect-ratio: 6/1; object-fit: contain"
          />
        </a>
        } @else {
        <img
          [src]="selectedLeague.banner_url"
          alt="Anzeige"
          class="w-full"
          style="aspect-ratio: 6/1; object-fit: contain"
        />
        }
      </div>
      }

      <div class="container mx-auto px-4 lg:px-8">
        <div class="h-[80px] flex items-center gap-[25px]">
          <fb-tab-item
            [isActive]="true"
            [link]="['./']"
            [activeColor]="selectedAssociation | gradient"
            >Übersicht</fb-tab-item
          >
          <fb-tab-item
            [link]="['./', 'tabelle']"
            [activeColor]="selectedAssociation | gradient"
            *ngIf="selectedLeague.league_type === 'league'"
            >Tabelle</fb-tab-item
          >
          <fb-tab-item
            [link]="['./', 'scorer']"
            [activeColor]="selectedAssociation | gradient"
            >Scorer</fb-tab-item
          >
        </div>
      </div>
      <div class="h-[10px] bg-fb-gray-200"></div>
    </div>

    <router-outlet></router-outlet>
  </ng-container>
</ng-container>
