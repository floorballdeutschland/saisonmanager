<ng-container *ngIf="selectedLeague$ | async as league">
  <h1 class="text-2xl">{{ league.name }} ({{ league.short_name }})</h1>
  <ul>
    <li><a [routerLink]="['./']">Übersicht</a></li>
    <li><a [routerLink]="['./', 'tabelle']">Tabelle</a></li>
    <li><a [routerLink]="['./', 'scorer']">Scorer</a></li>
  </ul>

  <router-outlet></router-outlet>
</ng-container>
