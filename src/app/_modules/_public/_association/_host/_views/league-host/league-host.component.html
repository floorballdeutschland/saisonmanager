<ng-container *ngIf="selectedLeague$ | async as selectedLeague">
  <ng-container *ngIf="selectedAssociation$ | async as selectedAssociation">
    <ng-container *ngIf="matches$ | async as matches">
      <fb-next-match-list [matches]="matches"></fb-next-match-list>
    </ng-container>

    <div *ngIf="displayAssociationHeader$ | async">
      <fb-header
        [headline]="selectedLeague.name"
        type="league"
        [subline]="selectedLeague.short_name"
        [isMarkedAsFavorite]="isLeagueFavorite(selectedLeague.id)"
        (markAsFavorite)="addToFavorites(selectedLeague)"
        (removeFromFavorites)="removeFavorite(selectedLeague.id)"
      ></fb-header>

      <div class="container mx-auto px-8 border-b-[10px] border-fb-gray-200">
        <div class="h-[80px] flex items-center gap-[25px]">
          <fb-tab-item
            [isActive]="true"
            [link]="['./']"
            [activeColor]="selectedAssociation | gradient"
            >Übersicht</fb-tab-item
          >
          <fb-tab-item
            [link]="['./', 'tabelle']"
            [activeColor]="selectedAssociation | gradient"
            >Tabelle</fb-tab-item
          >
          <fb-tab-item
            [link]="['./', 'scorer']"
            [activeColor]="selectedAssociation | gradient"
            >Scorer</fb-tab-item
          >
        </div>
      </div>
    </div>

    <router-outlet></router-outlet>
  </ng-container>
</ng-container>
