<ng-container *ngIf="selectedAssociation$ | async">
  @if (selectedStateAssociation$ | async; as sa) { @if (sa.banner_url) {
  <div class="container mx-auto px-4 lg:px-8 py-3">
    @if (safeBannerLink(sa.banner_link_url); as link) {
    <a
      [href]="link"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Werbung – externer Link öffnet in neuem Tab"
    >
      <img
        [src]="sa.banner_url"
        alt="Anzeige"
        class="w-full"
        style="aspect-ratio: 6/1; object-fit: contain"
      />
    </a>
    } @else {
    <img
      [src]="sa.banner_url"
      alt="Anzeige"
      class="w-full"
      style="aspect-ratio: 6/1; object-fit: contain"
    />
    }
  </div>
  } }
  <router-outlet></router-outlet>
</ng-container>
