<div class="grid grid-cols-[200px,1fr]">
  <div>
    <ul>
      <li *ngFor="let league of leagues$ | async">
        <a [routerLink]="['./', league.id]">{{ league.name }}</a>
      </li>
    </ul>
  </div>
  <div>
    <ng-container *ngIf="selectedAssociation$ | async as association">
      <h1 class="text-2xl">
        {{ association.name }} ({{ association.short_name }})
      </h1>

      <router-outlet></router-outlet>
    </ng-container>

    <a [routerLink]="['/']">Back</a>
  </div>
</div>
