<div class="container mx-auto px-4 lg:px-8 mb-5">
  <h2 class="font-bold text-xl lg:text-2xl mt-8">Alle Spielbegegnungen</h2>

  <div class="mt-4 lg:mt-8 pb-16">
    <ng-container *ngIf="matches$ | async as matches">
      <fb-match-encounter-list
        [matches]="matches"
        [withMatchDay]="true"
      ></fb-match-encounter-list>
    </ng-container>
  </div>
</div>
