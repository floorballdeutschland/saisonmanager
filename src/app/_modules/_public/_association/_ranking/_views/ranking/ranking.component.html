<div class="container mx-auto px-8">
  <h2 class="font-bold text-2xl mt-8">Tabelle</h2>

  <div class="mt-8">
    <ng-container *ngIf="teamRankings$ | async as teamRankings">
      <fb-team-ranking-table
        [routerPrefix]="['../', 'team']"
        [data]="teamRankings"
      ></fb-team-ranking-table>
    </ng-container>
  </div>

  <div class="mt-12">
    <h2 class="font-bold text-2xl mb-8">Spielbegegnungen</h2>
    <ng-container *ngIf="matches$ | async as matches">
      <fb-match-encounter-list [matches]="matches"></fb-match-encounter-list>
    </ng-container>
  </div>
</div>
