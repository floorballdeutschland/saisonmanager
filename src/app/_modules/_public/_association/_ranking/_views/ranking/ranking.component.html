<div class="container mx-auto px-4 lg:px-8 mb-5">
  <h2 class="font-bold text-xl lg:text-2xl mt-8">Tabelle</h2>

  <div class="mt-4 lg:mt-8">
    <ng-container
      *ngIf="teamRankings$ | async as teamRankings; else loadingTeamRankings"
    >
      <fb-team-ranking-table
        [routerPrefix]="['../', 'team']"
        [data]="teamRankings"
      ></fb-team-ranking-table>
    </ng-container>

    <ng-template #loadingTeamRankings>
      <fb-skeleton-table></fb-skeleton-table>
    </ng-template>
  </div>
</div>

<div class="border-t border-fb-gray-200 pb-16">
  <div class="container mx-auto px-4 lg:px-8">
    <div class="mt-6 lg:mt-12">
      <div class="flex items-center justify-between mb-4 lg:mb-8">
        <h2 class="font-bold text-xl lg:text-2xl">Spielbegegnungen</h2>
        <ng-container *ngIf="selectedLeague$ | async as selectedLeague">
          <fb-match-day
            [matchDays]="selectedLeague.game_day_numbers"
            [selectedMatchDay]="selectedMatchDay"
            (selectMatchDay)="selectMatchDay($event, selectedLeague.id)"
          ></fb-match-day>
        </ng-container>
      </div>

      <ng-container *ngIf="matches$ | async as matches; else loadingMatches">
        <fb-match-encounter-list [matches]="matches"></fb-match-encounter-list>
      </ng-container>

      <ng-template #loadingMatches>
        <fb-skeleton-match-encounter-list></fb-skeleton-match-encounter-list>
      </ng-template>
    </div>
  </div>
</div>
