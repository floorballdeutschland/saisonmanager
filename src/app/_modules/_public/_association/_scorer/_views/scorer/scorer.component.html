<div class="container mx-auto px-4 lg:px-8">
  @if (league$ | async; as league) {
    @if (league.enable_scorer) {
      <h2 class="font-bold text-xl lg:text-2xl mt-8">Top Scorer</h2>

      <div class="mt-4 lg:mt-8 pb-16">
        @if (playerRankings$ | async; as playerRankings) {
          @if (playerRankings.length) {
            <fb-player-ranking-table
              [data]="
                playerRankings.slice((currentPage - 1) * 30, 30 * currentPage)
              "
            ></fb-player-ranking-table>
          } @else {
            <div class="text-center text-fb-gray-400 my-12">
              Noch keine Scorer vorhanden
            </div>
          }
          <div class="mt-3">
            <fb-pagination
              [numberOfPages]="getPages(playerRankings.length)"
              (changePage)="changePage($event)"
              [currentPage]="currentPage"
            ></fb-pagination>
          </div>
        } @else {
          <fb-skeleton-table></fb-skeleton-table>
        }
      </div>
    } @else {
      <div class="text-center text-fb-gray-400 my-12">
        Die Scorerliste ist für diese Liga nicht aktiviert.
      </div>
    }
  } @else {
    <div class="mt-4 lg:mt-8 pb-16">
      <fb-skeleton-table></fb-skeleton-table>
    </div>
  }
</div>
