<div class="container mx-auto px-4 lg:px-8">
  <h1
    class="font-bold text-[32px] lg:text-[42px] font-bold pt-4 lg:pt-0 my-4 lg:my-8"
  >
    Saisonmanager
  </h1>
</div>

<div class="bg-fb-gray-800 pt-4 lg:pt-8 pb-16">
  <div class="container mx-auto px-4 lg:px-8">
    <h2 class="font-bold text-xl lg:text-2xl">Spielbetriebe</h2>
    <ng-container *ngIf="associations$ | async as associations">
      <div
        class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-[25px] mt-4 lg:mt-9"
      >
        <ng-container *ngFor="let association of associations">
          <fb-operation
            [full]="association.id === 1"
            [gameOperation]="association"
            [ngClass]="{
              'col-span-1 md:col-span-2 lg:col-span-3': association.id === 1
            }"
          ></fb-operation>
        </ng-container>
      </div>
    </ng-container>
  </div>
</div>
