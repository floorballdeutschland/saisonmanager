<h1 class="text-3xl text-center font-bold">Styleguide</h1>
<p class="text-lg text-center">To test components</p>

<div class="flex w-[100%]">
  <div>
    <fb-sidebar></fb-sidebar>
  </div>
  <div class="flex-auto">
    <fb-header
      headline="1. Floorball Bundesliga"
      subline="1. FBL"
      type="league"
    ></fb-header>
    <fb-header
      headline="Spieldetails"
      subline="Red Devils vs. Prianhas ETV"
      type="match"
    ></fb-header>
    <fb-header
      headline="Red Devils"
      subline="Teamprofil"
      type="team"
    ></fb-header>
    <fb-player-ranking-table
      [data]="playerRankingMock"
    ></fb-player-ranking-table>
  </div>
</div>

<div class="container mx-auto">
  <div>
    <h2 class="text-xl text-center font-bold">Player Ranking table</h2>
    <fb-player-ranking-table
      [data]="playerRankingMock"
    ></fb-player-ranking-table>
  </div>

  <div class="mt-3">
    <h2 class="text-xl text-center font-bold">Team Ranking table</h2>
    <fb-team-ranking-table [data]="teamRankingMock"></fb-team-ranking-table>

    <h3 class="text-lg text-center font-bold mt-3">Team Ranking table small</h3>
    <fb-team-ranking-table
      type="small"
      [data]="teamRankingMock"
    ></fb-team-ranking-table>
  </div>

  <div class="mt-3">
    <h2 class="text-xl text-center font-bold">Match Pairing</h2>
    <fb-match-pairing-list
      [matches]="[].constructor(4)"
    ></fb-match-pairing-list>
  </div>

  <div class="mt-10">
    <h2 class="text-xl text-center font-bold">Match Encounter</h2>
    <fb-match-encounter-list
      [matches]="[].constructor(5)"
    ></fb-match-encounter-list>
  </div>

  <div class="mt-10 max-w-[50%]">
    <ng-container *ngIf="game">
      <fb-match-info [game]="game"></fb-match-info>
    </ng-container>
  </div>

  <div class="mt-10">
    <h2 class="text-xl text-center font-bold">Kader</h2>
    <fb-team-lineup [lineup]="lineupMock"></fb-team-lineup>
  </div>

  <div class="mt-10">
    <h2 class="text-xl text-center font-bold">Next matches</h2>
    <fb-next-match-list [matches]="[].constructor(10)"></fb-next-match-list>
  </div>

  <div class="mt-10">
    <h2 class="text-xl text-center font-bold">Match history</h2>
    <fb-match-history [gameEvents]="[].constructor(3)"></fb-match-history>
  </div>

  <div class="mt-10">
    <h2 class="text-xl text-center font-bold">Match day</h2>
    <fb-match-day></fb-match-day>

    <p
      class="
        h-[300px]
        w-[300px]
        bg-fb-gray-200
        flex
        items-center
        justify-center
      "
    >
      Block
    </p>
  </div>

  <div class="mt-10">
    <h2 class="text-xl text-center font-bold">Operation component</h2>
    <div class="bg-fb-gray-200 p-5 grid grid-cols-3 gap-[25px]">
      <fb-operation class="block"></fb-operation>
      <fb-operation class="block"></fb-operation>
      <fb-operation class="block"></fb-operation>
    </div>
  </div>
</div>
