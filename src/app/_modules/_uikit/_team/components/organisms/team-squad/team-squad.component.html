<div
  class="relative z-40"
  aria-labelledby="modal-title"
  role="dialog"
  aria-modal="true"
>
  <div
    class="fixed inset-0 bg-gray-500 backdrop-blur-sm bg-opacity-75 transition-opacity"
  ></div>

  <div class="fixed z-10 inset-0 overflow-y-auto">
    <div
      class="flex sm:items-center justify-center min-h-full p-4 text-center sm:p-0"
    >
      <div
        class="relative bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:max-w-xl sm:w-full sm:p-6"
      >
        <div class="sm:flex sm:items-start">
          <div
            class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-gray-200 sm:mx-0"
          >
            <!-- Heroicon name: outline/users -->
            <svg
              class="h-6 w-6 text-gray-600"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
              />
            </svg>
          </div>
          <div class="w-full mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
            <h3
              class="text-lg leading-6 font-medium text-gray-900"
              id="modal-title"
            >
              Kader bearbeiten<br />
              <span class="text-sm font-normal">{{ team }}</span>
            </h3>
            <div class="mt-2">
              <p class="mb-2 text-sm text-gray-500">
                Füge Spielerinnen und Spieler zu deiner Kaderliste hinzu.
              </p>
              <p class="text-sm font-bold text-gray-500">
                Spieler/innen im Kader: {{ players ? players.length : 0 }}
              </p>
            </div>

            <div class="mt-4">
              <div class="sm:hidden">
                <label for="tabs" class="sr-only">Select a tab</label>
                <select
                  [(ngModel)]="filter"
                  id="tabs"
                  name="tabs"
                  class="block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
                >
                  <option
                    *ngFor="let filterItem of filterTypes"
                    [value]="filterItem.type"
                    [selected]="filterItem.type === filter"
                  >
                    {{ filterItem.title }}
                  </option>
                </select>
              </div>
              <div class="hidden sm:block">
                <div class="border-b border-gray-200">
                  <nav class="-mb-px flex space-x-4" aria-label="Tabs">
                    <button
                      *ngFor="let filterItem of filterTypes"
                      (click)="setFilter(filterItem.type)"
                      [class]="
                        filterItem.type === filter
                          ? 'border-primary cursor-pointer text-primary text-600 whitespace-nowrap py-2 px-4 border-b-2 font-medium text-sm'
                          : 'border-transparent cursor-pointer text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-2 px-4 border-b-2 font-medium text-sm'
                      "
                    >
                      {{ filterItem.title }}
                    </button>
                  </nav>
                </div>
              </div>
            </div>

            <div class="mt-1">
              <ul
                role="list"
                class="divide-y divide-gray-200"
                *ngIf="licenseHash?.current_requests"
              >
                <li
                  class="py-2"
                  *ngFor="
                    let player of licenseHash.current_requests
                      | teamLineupPlayer: players:filter
                  "
                >
                  <fb-team-squad-player
                    (updateLineup)="updateLineup($event)"
                    (setCaptainPlayerId)="setCaptainPlayerId($event)"
                    (setPlayerFocus)="setPlayerFocus($event)"
                    [playerFocus]="playerFocus"
                    [side]="side"
                    [player]="player.player"
                    [lineup]="players"
                    [gamePlayerEntry]="player.gamePlayerEntry"
                    [captainPlayerId]="captainPlayerId"
                  ></fb-team-squad-player>
                </li>
              </ul>
            </div>
          </div>
        </div>

        <div class="mt-5 sm:mt-4 sm:ml-10 sm:pl-4 sm:flex sm:flex-row-reverse">
          <button
            type="button"
            class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 px-4 py-2 bg-white text-base font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 sm:mt-0 sm:w-auto sm:text-sm"
            (click)="onClose()"
          >
            Schließen
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
