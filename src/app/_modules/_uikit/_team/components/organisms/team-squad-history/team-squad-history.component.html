<div
  class="relative z-40"
  aria-labelledby="modal-title"
  role="dialog"
  aria-modal="true"
>
  <div
    class="fixed inset-0 bg-gray-500 backdrop-blur-sm bg-opacity-75 transition-opacity"
  ></div>

  <div class="fixed z-10 inset-0 overflow-y-auto">
    <div
      class="flex sm:items-center justify-center min-h-full p-4 text-center sm:p-0"
    >
      <div
        class="relative bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:max-w-xl sm:w-full sm:p-6"
      >
        <div class="sm:flex sm:items-start">
          <div
            class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-gray-200 sm:mx-0"
          >
            <!-- Heroicon name: outline/duplicate -->
            <svg
              class="h-6 w-6 text-gray-600"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
              />
            </svg>
          </div>
          <div class="w-full mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
            <h3
              class="text-lg leading-6 font-medium text-gray-900"
              id="modal-title"
            >
              Kader laden
            </h3>
            <div class="mt-2">
              <p class="text-sm text-gray-500">
                Dupliziere die Kaderliste von einem der untenstehenden Spiele
                für das ausgewählte:
              </p>
            </div>

            <div class="mt-3">
              <div
                class="bg-white border border-gray-300 overflow-hidden rounded-md"
              >
                <ul role="list" class="divide-y divide-gray-300">
                  <li class="px-3 sm:px-6 py-4">
                    <label class="flex items-center text-left" for="match-1">
                      <div class="pr-4">
                        <input
                          id="match-1"
                          name="match"
                          value="1"
                          type="radio"
                          class="rounded-full focus:ring-0 h-5 w-5 text-gray-500 border-gray-300 rounded"
                        />
                      </div>
                      <div class="flex-grow">
                        <div class="mb-1">24.03.2022</div>
                        <div class="mb-1 text-xs">Bully: 13:00 Uhr</div>
                        <div
                          class="flex flex-col sm:flex-row sm:items-center text-xs font-light"
                        >
                          <span>SG TSV Schwarzenbek / TSV Glinde</span>
                          <span class="text-[10px] py-1 sm:px-2.5 sm:py-0"
                            >vs.</span
                          >
                          <span>SG TSV Tetenbüll / SV Hemmingstedt</span>
                        </div>
                      </div>
                    </label>
                  </li>

                  <li class="px-3 sm:px-6 py-4">
                    <label class="flex items-center text-left" for="match-2">
                      <div class="pr-4">
                        <input
                          id="match-2"
                          name="match"
                          value="2"
                          type="radio"
                          class="rounded-full focus:ring-0 h-5 w-5 text-gray-500 border-gray-300 rounded"
                        />
                      </div>
                      <div class="flex-grow">
                        <div class="mb-1">24.03.2022</div>
                        <div class="mb-1 text-xs">Bully: 13:00 Uhr</div>
                        <div
                          class="flex flex-col sm:flex-row sm:items-center text-xs font-light"
                        >
                          <span>SG TSV Schwarzenbek / TSV Glinde</span>
                          <span class="text-[10px] py-1 sm:px-2.5 sm:py-0"
                            >vs.</span
                          >
                          <span>SG TSV Tetenbüll / SV Hemmingstedt</span>
                        </div>
                      </div>
                    </label>
                  </li>

                  <li class="px-3 sm:px-6 py-4">
                    <label class="flex items-center text-left" for="match-3">
                      <div class="pr-4">
                        <input
                          id="match-3"
                          name="match"
                          value="3"
                          type="radio"
                          class="rounded-full focus:ring-0 h-5 w-5 text-gray-500 border-gray-300 rounded"
                        />
                      </div>
                      <div class="flex-grow">
                        <div class="mb-1">24.03.2022</div>
                        <div class="mb-1 text-xs">Bully: 13:00 Uhr</div>
                        <div
                          class="flex flex-col sm:flex-row sm:items-center text-xs font-light"
                        >
                          <span>SG TSV Schwarzenbek / TSV Glinde</span>
                          <span class="text-[10px] py-1 sm:px-2.5 sm:py-0"
                            >vs.</span
                          >
                          <span>SG TSV Tetenbüll / SV Hemmingstedt</span>
                        </div>
                      </div>
                    </label>
                  </li>

                  <li class="px-3 sm:px-6 py-4">
                    <label class="flex items-center text-left" for="match-4">
                      <div class="pr-4">
                        <input
                          id="match-4"
                          name="match"
                          value="4"
                          type="radio"
                          class="rounded-full focus:ring-0 h-5 w-5 text-gray-500 border-gray-300 rounded"
                        />
                      </div>
                      <div class="flex-grow">
                        <div class="mb-1">24.03.2022</div>
                        <div class="mb-1 text-xs">Bully: 13:00 Uhr</div>
                        <div
                          class="flex flex-col sm:flex-row sm:items-center text-xs font-light"
                        >
                          <span>SG TSV Schwarzenbek / TSV Glinde</span>
                          <span class="text-[10px] py-1 sm:px-2.5 sm:py-0"
                            >vs.</span
                          >
                          <span>SG TSV Tetenbüll / SV Hemmingstedt</span>
                        </div>
                      </div>
                    </label>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-5 sm:mt-4 sm:ml-10 sm:pl-4 sm:flex sm:flex-row-reverse">
          <button
            type="button"
            class="inline-flex justify-center w-full rounded-md border border-transparent shadow-sm px-4 py-2 bg-green-600 text-base font-medium text-white hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 sm:ml-3 sm:w-auto sm:text-sm"
          >
            <svg
              class="-ml-0.5 mt-0.5 mr-2 h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M19 13l-7 7-7-7m14-8l-7 7-7-7"
              />
            </svg>
            Kader laden
          </button>
          <button
            type="button"
            class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 px-4 py-2 bg-white text-base font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 sm:mt-0 sm:w-auto sm:text-sm"
            (click)="onClose()"
          >
            Abbrechen
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
