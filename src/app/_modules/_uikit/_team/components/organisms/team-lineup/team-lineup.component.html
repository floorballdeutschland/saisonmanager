<ng-container *ngFor="let player of lineup | sortTrikotNumber">
  <fb-player-lineup-item
    [trikot_number]="player.trikot_number"
    [player_name]="player | fullName"
    [player_id]="player.player_id"
    [youth]="player.youth"
    [position]="
      player.captain
        ? (player.gender === 'W' ? 'Kapitänin' : 'Kapitän') +
          ', ' +
          player.position
        : player.position
    "
  ></fb-player-lineup-item>
</ng-container>
