@if (selectedAssociation) {
  <h2 class="uppercase text-fb-gray-100 font-bold mt-6 lg:mt-12">Ligen</h2>

  @if (seasons.length > 1) {
    <select
      [value]="selectedSeasonId"
      (change)="onSeasonChange($event)"
      class="mt-3 w-full text-sm font-bold text-fb-gray-500 bg-white border border-fb-gray-600 rounded-[5px] px-3 py-2 cursor-pointer hover:border-black focus:outline-none"
    >
      @for (s of seasons; track s) {
        <option [value]="s.id">{{ s.name }}</option>
      }
    </select>
  }

  <nav>
    <ul>
      @for (item of leagues; track item) {
        <li class="mt-4 mb-4">
          <a
            [routerLinkActive]="'!text-black'"
            [routerLink]="[
              '/',
              selectedAssociation.path,
              item | normalizeLeagueRoute,
            ]"
            class="font-bold text-fb-gray-500 hover:text-black text-base"
            title="{{ item.name }}"
            >{{ item.name }}</a
          >
        </li>
      }
      <li class="mt-10">
        <a
          [routerLink]="['/']"
          class="block text-center font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-800 border-fb-gray-600 rounded-[5px] cursor-pointer w-full"
        >
          Spielbetrieb wechseln
        </a>
      </li>
    </ul>
  </nav>
} @else {
  <h2 class="uppercase text-fb-gray-100 font-bold mt-6 lg:mt-12">
    Spielbetriebe
  </h2>

  <nav>
    <ul>
      @for (association of associations; track association.id) {
        <li class="mt-4 mb-4">
          <a
            [routerLink]="['/', association.path]"
            class="font-bold text-fb-gray-500 hover:text-black text-base"
            title="{{ association.name }}"
            >{{ association.name }}</a
          >
        </li>
      }
    </ul>
  </nav>
}
