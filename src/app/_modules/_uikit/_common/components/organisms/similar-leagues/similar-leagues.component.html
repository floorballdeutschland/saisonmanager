<div>
  <div class="flex items-end content-between mb-10">
    <h4 class="font-bold text-black text-2xl leading-[26px]">Top Ligen</h4>
  </div>

  <div>
    <ul>
      <li
        class="grid gap-4 grid-cols-2 border-b border-fb-gray-700 py-2.5"
        *ngFor="let league of leagues"
      >
        <div>
          <span class="text-sm font-bold mr-1.5">{{ league.name }}</span>
          <span class="text-sm text-fb-gray-900">{{
            league.game_operation_name
          }}</span>
        </div>
        <span
          class="text-sm font-bold text-right text-fb-gray-500 hover:text-black"
          ><a [routerLink]="['../', league.id]">Zur Liga</a></span
        >
      </li>
    </ul>
  </div>
</div>
