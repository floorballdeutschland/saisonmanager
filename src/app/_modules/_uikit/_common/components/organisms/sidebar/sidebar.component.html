<div
  class="flex flex-row lg:block justify-between items-center lg:h-full fixed z-40 top-0 bg-fb-gray-200 lg:max-w-[300px] p-5 w-full lg:relative gap-[20px] print:hidden"
>
  <a [routerLink]="['/']" title="Startseite" class="flex-1">
    <ng-container *ngIf="stateAssociation?.logo_url; else goLogo">
      <img
        [src]="stateAssociation!.logo_url"
        class="h-full max-w-full object-contain max-h-14"
        alt="{{ stateAssociation!.name }}"
      />
    </ng-container>

    <ng-template #goLogo>
      <ng-container *ngIf="association?.logo_url; else fbLogo">
        <img
          [src]="association!.logo_url"
          class="h-full max-w-full object-contain max-h-14"
        />
      </ng-container>
    </ng-template>

    <ng-template #fbLogo>
      <fb-logo></fb-logo>
    </ng-template>
  </a>

  <!-- open menu -->
  <a
    *ngIf="!menuIsOpen"
    href="#"
    class="w-[20px] h-[18px] cursor-pointer lg:hidden"
    (click)="$event.preventDefault(); openMenu()"
  >
    <svg
      width="40"
      height="36"
      viewBox="0 0 20 18"
      xmlns="http://www.w3.org/2000/svg"
      class="currentColor object-contain w-full h-full text-black focus-visible:text-red fill-white group-hover:fill-vbl-red group-focus:fill-red"
    >
      <path
        fill="currentColor"
        d="M0.6875 3.42188H18.5625C18.9062 3.42188 19.25 3.12109 19.25 2.73438V1.01562C19.25 0.671875 18.9062 0.328125 18.5625 0.328125H0.6875C0.300781 0.328125 0 0.671875 0 1.01562V2.73438C0 3.12109 0.300781 3.42188 0.6875 3.42188ZM0.6875 10.2969H18.5625C18.9062 10.2969 19.25 9.99609 19.25 9.60938V7.89062C19.25 7.54688 18.9062 7.20312 18.5625 7.20312H0.6875C0.300781 7.20312 0 7.54688 0 7.89062V9.60938C0 9.99609 0.300781 10.2969 0.6875 10.2969ZM0.6875 17.1719H18.5625C18.9062 17.1719 19.25 16.8711 19.25 16.4844V14.7656C19.25 14.4219 18.9062 14.0781 18.5625 14.0781H0.6875C0.300781 14.0781 0 14.4219 0 14.7656V16.4844C0 16.8711 0.300781 17.1719 0.6875 17.1719Z"
      />
    </svg>
  </a>

  <button
    *ngIf="menuIsOpen"
    class="w-[20px] h-[18px] cursor-pointer"
    (click)="closeMenu()"
  >
    <svg
      class="currentColor object-contain w-full h-full fill-black"
      width="17"
      height="16"
      viewBox="0 0 17 16"
      fill="currentColor"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M11.3984 7.75L15.6953 3.45312C16.2539 2.9375 16.2539 2.07812 15.6953 1.5625L14.75 0.617188C14.2344 0.0585938 13.375 0.0585938 12.8594 0.617188L8.5625 4.91406L4.22266 0.617188C3.70703 0.0585938 2.84766 0.0585938 2.33203 0.617188L1.38672 1.5625C0.828125 2.07812 0.828125 2.9375 1.38672 3.45312L5.68359 7.75L1.38672 12.0898C0.828125 12.6055 0.828125 13.4648 1.38672 13.9805L2.33203 14.9258C2.84766 15.4844 3.70703 15.4844 4.22266 14.9258L8.5625 10.6289L12.8594 14.9258C13.375 15.4844 14.2344 15.4844 14.75 14.9258L15.6953 13.9805C16.2539 13.4648 16.2539 12.6055 15.6953 12.0898L11.3984 7.75Z"
      />
    </svg>
  </button>

  <ng-content></ng-content>
  <fb-metanavigation
    (closeHandler)="closeMenu()"
    class="hidden lg:block"
  ></fb-metanavigation>

  <div *ngIf="activeBanner" class="hidden lg:block mt-4 px-0">
    <a
      *ngIf="safeBannerLink(activeBanner.linkUrl); else bannerImg"
      [href]="safeBannerLink(activeBanner.linkUrl)"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Werbung – externer Link öffnet in neuem Tab"
    >
      <img
        [src]="activeBanner.url"
        alt="Anzeige"
        class="w-full"
        style="aspect-ratio: 6/1; object-fit: contain"
      />
    </a>
    <ng-template #bannerImg>
      <img
        [src]="activeBanner.url"
        alt="Anzeige"
        class="w-full"
        style="aspect-ratio: 6/1; object-fit: contain"
      />
    </ng-template>
  </div>
</div>
