<ng-container *ngIf="favorites?.length || favoriteTeams?.length">
  <h2 class="uppercase text-fb-gray-100 font-bold mt-12">Favoriten</h2>

  <nav *ngIf="favorites?.length">
    <ul class="">
      <li *ngFor="let leagueWithOperation of favorites" class="mt-4">
        <h3
          *ngIf="favorites.length > 1"
          class="font-bold text-fb-gray-100 truncate"
        >
          {{ leagueWithOperation.operation.name }}
        </h3>

        <ul [class]="favorites.length > 1 ? 'pl-4' : ''">
          <li
            *ngFor="let league of leagueWithOperation.leagues"
            class="mt-4 mb-4"
          >
            <a
              [routerLinkActive]="'!text-black'"
              [routerLink]="[
                '/',
                leagueWithOperation.operation.path,
                league | normalizeLeagueRoute
              ]"
              class="font-bold text-fb-gray-500 hover:text-black text-base"
              title="{{ league.name }}"
              >{{ league.name }}</a
            >
            <button
              (click)="removeFavorite.emit(league.id)"
              class="ml-1 text-fb-gray-400 hover:text-black text-xs leading-none"
              title="Aus Favoriten entfernen"
            >
              ✕
            </button>
          </li>
        </ul>
      </li>
    </ul>
  </nav>

  <nav *ngIf="favoriteTeams?.length" class="mt-4">
    <h3 class="text-xs uppercase text-fb-gray-400 font-semibold mb-2">Teams</h3>
    <ul>
      <li *ngFor="let team of favoriteTeams" class="mt-3 mb-3">
        <a
          [routerLinkActive]="'!text-black'"
          [routerLink]="[
            '/',
            team.operation_path,
            team.league_path,
            'team',
            team.id
          ]"
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          [title]="team.name"
          >{{ team.name }}</a
        >
        <button
          (click)="removeTeamFavorite.emit(team.id)"
          class="ml-1 text-fb-gray-400 hover:text-black text-xs leading-none"
          title="Aus Favoriten entfernen"
        >
          ✕
        </button>
        <p *ngIf="team.league_name" class="text-xs text-fb-gray-400">
          {{ team.league_name }}
        </p>
      </li>
    </ul>
  </nav>
</ng-container>
