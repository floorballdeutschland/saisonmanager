<ng-container *ngIf="isLoggedIn$ | async">
  <h2 class="uppercase text-fb-gray-100 font-bold mt-12">Verwaltung</h2>
  <nav>
    <ul>
      <li class="mt-4 mb-4" *ngIf="showItem('menu_item_league_admin')">
        <a
          [routerLink]="['/', 'verwaltung', 'ligen']"
          (click)="closeMenu()"
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          >Ligaverwaltung</a
        >
      </li>
      <li class="mt-4 mb-4" *ngIf="showItem('menu_item_player_admin')">
        <a
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          [routerLink]="['/', 'verwaltung', 'vereine', 'alle', 'spieler']"
          (click)="closeMenu()"
          >Spielerverwaltung</a
        >
      </li>

      <li class="mt-4 mb-4" *ngIf="showItem('menu_item_player_admin_vm')">
        <a
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          [routerLink]="['/', 'verwaltung', 'vereine', 'alle', 'spieler']"
          (click)="closeMenu()"
          >Spielerverwaltung</a
        >
      </li>

      <li class="mt-4 mb-4" *ngIf="showItem('menu_item_league_admin')">
        <a
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          [routerLink]="['/', 'verwaltung', 'vereine']"
          (click)="closeMenu()"
          >Vereinsverwaltung</a
        >
      </li>
      <li class="mt-4 mb-4" *ngIf="showItem('menu_item_licence_list')">
        <a
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          [routerLink]="['/', 'verwaltung', 'lizenzwesen', 'lizenzlisten']"
          (click)="closeMenu()"
          >Lizenzlisten</a
        >
      </li>
      <li class="mt-4 mb-4" *ngIf="showItem('menu_item_licence_club_admin')">
        <a
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          [routerLink]="['/', 'verwaltung', 'lizenzwesen', 'verein']"
          (click)="closeMenu()"
          >Lizenzwesen (Verein)</a
        >
      </li>
      <li class="mt-4 mb-4" *ngIf="showItem('menu_item_licence_admin')">
        <a
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          [routerLink]="['/', 'verwaltung', 'lizenzwesen', 'verband']"
          (click)="closeMenu()"
          >Lizenzwesen (Verband)</a
        >
      </li>
      <li class="mt-4 mb-4" *ngIf="showItem('menu_item_referee_admin')">
        <a
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          [routerLink]="['/', 'verwaltung', 'schiedsrichter']"
          (click)="closeMenu()"
          >Schiedsrichterverwaltung</a
        >
      </li>
      <li
        class="mt-4 mb-4"
        *ngIf="showItem('menu_item_state_association_admin')"
      >
        <a
          class="font-bold text-fb-gray-500 hover:text-black text-base"
          [routerLink]="['/', 'verwaltung', 'landesverbaende']"
          (click)="closeMenu()"
          >Landesverbände</a
        >
      </li>
    </ul>
  </nav>
</ng-container>

<h2 class="uppercase text-fb-gray-100 font-bold mt-12">
  Weitere<a href="/login">s</a>
</h2>
<nav>
  <ul>
    <li class="mt-4 mb-4" *ngIf="(isLoggedIn$ | async) === false">
      <a
        href="/login"
        class="font-bold text-fb-gray-500 hover:text-black text-base"
        >Login</a
      >
    </li>
    <li class="mt-4 mb-4" *ngIf="isLoggedIn$ | async">
      <a
        href=""
        (click)="logout()"
        class="font-bold text-fb-gray-500 hover:text-black text-base"
        >Logout ({{ username }})</a
      >
    </li>
    <li class="mt-4 mb-4">
      <a
        href="https://floorball.de/impressum/"
        target="_blank"
        class="font-bold text-fb-gray-500 hover:text-black text-base"
        >Impressum</a
      >
    </li>
  </ul>
</nav>

<p *ngIf="version$ | async as version" class="text-xs text-fb-gray-100 mt-8">
  v{{ version }}
</p>
