<div class="top-0 fixed w-full left-0 bg-fb-gray-200 p-5 h-full overflow-auto">
  <div class="h-14 flex flex-row justify-end items-center"></div>

  <ng-container *ngIf="associations$ | async as association">
    <h2 class="uppercase text-fb-gray-100 font-bold mt-6 lg:mt-12">
      Spielbetriebe
    </h2>

    <nav>
      <ul>
        <li *ngFor="let item of association" class="mt-4 mb-4">
          <a
            [routerLinkActive]="'!text-black'"
            [routerLink]="['/', item.path]"
            class="font-bold text-fb-gray-500 hover:text-black text-base"
            title="{{ item.name }}"
            (click)="close()"
            >{{ item.name }}</a
          >
        </li>
      </ul>
    </nav>
  </ng-container>
  <ng-container *ngIf="selectedAssociation$ | async as selectedAssociation">
    <h2 class="uppercase text-fb-gray-100 font-bold mt-6 lg:mt-12">Ligen</h2>

    <nav *ngIf="leagues$ | async as leagues">
      <ul>
        <li *ngFor="let item of leagues" class="mt-4 mb-4">
          <a
            [routerLinkActive]="'!text-black'"
            [routerLink]="['/', selectedAssociation.path, item.id]"
            class="font-bold text-fb-gray-500 hover:text-black text-base"
            title="{{ item.name }}"
            (click)="close()"
            >{{ item.name }}</a
          >
        </li>

        <li class="mt-5">
          <a
            [routerLink]="['/']"
            class="block text-center font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-800 border-fb-gray-600 rounded-[5px] cursor-pointer w-full"
            (click)="close()"
          >
            Spielbetrieb wechseln
          </a>
        </li>
      </ul>
    </nav>
  </ng-container>

  <ng-container *ngIf="favoriteLeagues$ | async as favoriteLeagues">
    <ng-container *ngIf="favoriteLeagues?.length">
      <h2 class="uppercase text-fb-gray-100 font-bold mt-4">Favoriten</h2>
      <nav>
        <ul>
          <li
            *ngFor="let leagueWithOperation of favoriteLeagues"
            class="mt-4 mb-4"
          >
            <a
              [routerLinkActive]="'!text-black'"
              [routerLink]="[
                '/',
                leagueWithOperation.operation.path,
                leagueWithOperation.league.id
              ]"
              class="font-bold text-fb-gray-500 hover:text-black text-base"
              title="{{ leagueWithOperation.league.name }}"
              (click)="close()"
              >{{ leagueWithOperation.league.name }}</a
            >
          </li>
        </ul>
      </nav>
    </ng-container>
  </ng-container>

  <fb-metanavigation></fb-metanavigation>
</div>
