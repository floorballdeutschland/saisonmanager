<div
  class="flex flex-col sm:flex-row items-start sm:items-end py-[30px] px-4 lg:px-8 content-between border-b border-fb-gray-200"
>
  @if (headline) {
    <h1
      class="font-bold text-black text-2xl md:text-3xl xl:text-4.5xl leading-[26px] xl:leading-[52px]"
    >
      {{ headline }}
    </h1>
  }
  @if (subline) {
    <h2
      class="mt-4 sm:mt-0 sm:mx-5 font-bold text-fb-gray-400 text-1xl lg:text-1xl xl:text-2xl leading-[18px] xl:leading-[39px]"
    >
      {{ subline }}
    </h2>
  }

  <div
    class="md:ml-auto mt-5 md:mt-0 min-w-[205px] flex justify-start md:justify-end"
  >
    @if (type === "match" || type === "team") {
      <button
        (click)="navigateBack.emit()"
        class="font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px]"
      >
        Zurück
      </button>
    }
    @if (type === "league") {
      <button
        (click)="
          isMarkedAsFavorite
            ? removeFromFavorites.emit()
            : markAsFavorite.emit()
        "
        class="font-bold text-black leading-[17px] text-sm px-2.5 md:px-5 py-1.5 md:py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px]"
      >
        {{
          isMarkedAsFavorite
            ? "Aus Favoriten entfernen"
            : "Als Favorit markieren"
        }}
      </button>
    }
  </div>
</div>
