<div class="flex flex-row justify-center">
  <ng-container *ngIf="numberOfPages > 1">
    <button
      class="mr-7 flex items-center justify-end focus:outline-none"
      [disabled]="currentPage <= 1"
      (click)="changePage.emit(currentPage - 1)"
    >
      <span class="block w-3 text-fb-gray-500"> <- </span>
    </button>

    <ng-container *ngIf="currentPage > 3">
      <button
        class="
          flex
          items-center
          justify-center
          cursor-pointer
          text-center text-sm text-fb-gray-500
          hover:text-black
          focus:outline-none
          mr-4
        "
        (click)="changePage.emit(1)"
        [ngClass]="{ 'text-fb-blue-100': 1 === currentPage }"
      >
        {{ 1 }}
      </button>
      <span *ngIf="currentPage > 4" class="text-fb-gray-500 inline-block mr-4"
        >...</span
      >
    </ng-container>

    <div
      class="
        flex flex-row
        justify-between
        self-center
        h-full
        overflow-hidden
        space-x-4
      "
    >
      <ng-container
        *ngFor="let page of [].constructor(numberOfPages); let i = index"
      >
        <button
          class="
            flex
            items-center
            justify-center
            cursor-pointer
            text-center text-sm text-fb-gray-500
            hover:text-black
            focus:outline-none
          "
          *ngIf="i + 1 <= currentPage + 2 && i + 1 >= currentPage - 2"
          (click)="changePage.emit(i + 1)"
          [ngClass]="{ 'text-fb-blue-100': i + 1 === currentPage }"
        >
          {{ i + 1 }}
        </button>
      </ng-container>
    </div>

    <ng-container *ngIf="currentPage < numberOfPages - 2">
      <span
        *ngIf="currentPage < numberOfPages - 3"
        class="text-fb-gray-500 inline-block ml-4"
        >...</span
      >
      <button
        class="
          flex
          items-center
          justify-center
          cursor-pointer
          text-center text-sm text-fb-gray-500
          hover:text-black
          focus:outline-none
          ml-4
        "
        (click)="changePage.emit(numberOfPages)"
        [ngClass]="{ 'text-fb-blue-100': numberOfPages === currentPage }"
      >
        {{ numberOfPages }}
      </button>
    </ng-container>

    <button
      class="ml-7 focus:outline-none"
      [disabled]="currentPage >= numberOfPages"
      (click)="changePage.emit(currentPage + 1)"
    >
      <span class="block w-3 text-fb-gray-500 hover:text-black"> --> </span>
    </button>
  </ng-container>
</div>
