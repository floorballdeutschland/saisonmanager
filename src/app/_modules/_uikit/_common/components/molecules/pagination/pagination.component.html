<div class="flex flex-row justify-center">
  <ng-container *ngIf="numberOfPages > 1">
    <button
      class="mr-7 flex items-center justify-end focus:outline-none"
      [disabled]="currentPage <= 1"
      (click)="changePage.emit(currentPage - 1)"
    >
      <span class="block w-3 text-fb-gray-500 hover:text-black">
        <svg
          aria-hidden="true"
          focusable="false"
          data-prefix="fas"
          data-icon="chevron-left"
          class="svg-inline--fa fa-chevron-left fa-w-10"
          role="img"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 320 512"
        >
          <path
            fill="currentColor"
            d="M34.52 239.03L228.87 44.69c9.37-9.37 24.57-9.37 33.94 0l22.67 22.67c9.36 9.36 9.37 24.52.04 33.9L131.49 256l154.02 154.75c9.34 9.38 9.32 24.54-.04 33.9l-22.67 22.67c-9.37 9.37-24.57 9.37-33.94 0L34.52 272.97c-9.37-9.37-9.37-24.57 0-33.94z"
          ></path>
        </svg>
      </span>
    </button>

    <ng-container *ngIf="currentPage > 3">
      <button
        class="
          flex
          items-center
          justify-center
          cursor-pointer
          text-center text-sm text-fb-gray-500
          hover:text-black
          focus:outline-none
          mr-4
        "
        (click)="changePage.emit(1)"
        [ngClass]="{ 'text-fb-black': 1 === currentPage }"
      >
        {{ 1 }}
      </button>
      <span *ngIf="currentPage > 4" class="text-fb-gray-500 inline-block mr-4"
        >...</span
      >
    </ng-container>

    <div
      class="
        flex flex-row
        justify-between
        self-center
        h-full
        overflow-hidden
        space-x-4
      "
    >
      <ng-container
        *ngFor="let page of [].constructor(numberOfPages); let i = index"
      >
        <button
          class="
            flex
            items-center
            justify-center
            cursor-pointer
            text-center text-sm text-fb-gray-500
            hover:text-black
            focus:outline-none
          "
          *ngIf="i + 1 <= currentPage + 2 && i + 1 >= currentPage - 2"
          (click)="changePage.emit(i + 1)"
          [ngClass]="{ '!text-black font-bold': i + 1 === currentPage }"
        >
          {{ i + 1 }}
        </button>
      </ng-container>
    </div>

    <ng-container *ngIf="currentPage < numberOfPages - 2">
      <span
        *ngIf="currentPage < numberOfPages - 3"
        class="text-fb-gray-500 inline-block ml-4"
        >...</span
      >
      <button
        class="
          flex
          items-center
          justify-center
          cursor-pointer
          text-center text-sm text-fb-gray-500
          hover:text-black
          focus:outline-none
          ml-4
        "
        (click)="changePage.emit(numberOfPages)"
        [ngClass]="{ 'text-fb-black': numberOfPages === currentPage }"
      >
        {{ numberOfPages }}
      </button>
    </ng-container>

    <button
      class="ml-7 focus:outline-none"
      [disabled]="currentPage >= numberOfPages"
      (click)="changePage.emit(currentPage + 1)"
    >
      <span class="block w-3 text-fb-gray-500 hover:text-black"
        ><svg
          aria-hidden="true"
          focusable="false"
          data-prefix="fas"
          data-icon="chevron-right"
          class="svg-inline--fa fa-chevron-right fa-w-10"
          role="img"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 320 512"
        >
          <path
            fill="currentColor"
            d="M285.476 272.971L91.132 467.314c-9.373 9.373-24.569 9.373-33.941 0l-22.667-22.667c-9.357-9.357-9.375-24.522-.04-33.901L188.505 256 34.484 101.255c-9.335-9.379-9.317-24.544.04-33.901l22.667-22.667c9.373-9.373 24.569-9.373 33.941 0L285.475 239.03c9.373 9.372 9.373 24.568.001 33.941z"
          ></path></svg
      ></span>
    </button>
  </ng-container>
</div>
