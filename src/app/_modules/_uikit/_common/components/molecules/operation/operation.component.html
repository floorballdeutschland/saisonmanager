<div>
  <div class="bg-white flex flex-col items-center justify-center">
    <div class="mt-8 h-[65px] mb-2.5 lg:mb-5">
      <img
        class="h-full w-full object-contain px-2"
        [src]="gameOperation.logo_url"
        [alt]="gameOperation.name"
      />
    </div>
  </div>

  <div class="bg-white my-[5px] py-[15px] px-[30px]">
    <div class="uppercase font-bold text-gray-400 text-sm mb-5">Top Ligen</div>
    <a
      *ngFor="let league of gameOperation.top_leagues"
      [routerLink]="['/', gameOperation.path, league.id]"
      class="
        block
        mb-4
        last:mb-0
        font-bold
        text-base
        truncate
        text-fb-gray-500
        hover:text-black
      "
    >
      {{ league.name }}
    </a>
  </div>

  <div class="bg-white h-[57px] flex items-center justify-center">
    <a
      [routerLink]="[
        '/',
        gameOperation.path,
        gameOperation.top_leagues?.length && gameOperation.top_leagues[0]?.id
          ? gameOperation.top_leagues[0].id
          : ''
      ]"
      [title]="gameOperation.name"
      class="
        font-bold
        text-black
        leading-[17px]
        text-sm
        px-5
        py-2.5
        border
        bg-white
        hover:bg-fb-gray-200
        border-fb-gray-600
        rounded-[5px]
        cursor-pointer
      "
    >
      Zum Spielbetrieb
    </a>
  </div>
</div>
