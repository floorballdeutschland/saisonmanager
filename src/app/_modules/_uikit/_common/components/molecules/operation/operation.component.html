<div>
  <div
    class="bg-white flex items-center"
    [ngClass]="{ 'justify-center': !full }"
  >
    <div
      class="h-[65px] my-2.5 lg:my-5 flex-1 px-[20px] flex"
      [ngClass]="{ 'justify-center': !full }"
    >
      <img
        class="h-full max-w-full object-contain px-2"
        [src]="gameOperation.logo_url"
        [alt]="gameOperation.name"
      />
    </div>
    <div
      class="bg-white h-[57px] items-center justify-center px-[20px] hidden md:flex"
      *ngIf="full"
    >
      <a
        [routerLink]="[
          '/',
          gameOperation.path,
          gameOperation.top_leagues[0] | normalizeLeagueRoute
        ]"
        [title]="gameOperation.name"
        class="font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
      >
        Zum Spielbetrieb
      </a>
    </div>
  </div>

  <div class="bg-white my-[5px] py-[15px] px-[30px]">
    <div class="uppercase font-bold text-gray-400 text-sm mb-5">Top Ligen</div>
    <div
      class="flex flex-col gap-2"
      [ngClass]="{
        'md:!flex-row !gap-[20px] flex-wrap': gameOperation.id === 1
      }"
    >
      <a
        *ngFor="let league of gameOperation.top_leagues"
        [routerLink]="['/', gameOperation.path, league | normalizeLeagueRoute]"
        class="block font-bold text-base truncate text-fb-gray-500 hover:text-black"
      >
        {{ league.name }}
      </a>
    </div>
  </div>

  <div
    class="bg-white h-[57px] flex items-center justify-center"
    [ngClass]="{ 'md:hidden': full }"
  >
    <a
      [routerLink]="[
        '/',
        gameOperation.path,
        gameOperation.top_leagues[0] | normalizeLeagueRoute
      ]"
      [title]="gameOperation.name"
      class="font-bold text-black leading-[17px] text-sm px-5 py-2.5 border bg-white hover:bg-fb-gray-200 border-fb-gray-600 rounded-[5px] cursor-pointer"
    >
      Zum Spielbetrieb
    </a>
  </div>
</div>
