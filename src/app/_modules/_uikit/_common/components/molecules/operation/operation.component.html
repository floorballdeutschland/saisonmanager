<div>
  <div class="bg-white flex flex-col items-center justify-center">
    <div class="mt-8 h-[65px]">
      <img [src]="gameOperation.logo_url" [alt]="gameOperation.name" />
    </div>

    <div class="text-center font-bold text-2xl h-[60px] flex items-center my-5">
      {{ gameOperation.name }}
    </div>
  </div>

  <div class="bg-white my-[5px] py-[15px] px-[30px]">
    <div class="uppercase font-bold text-gray-400 text-sm mb-5">
      Liga Favoriten
    </div>
    <div
      *ngFor="let item of [].constructor(2)"
      class="mb-4 last:mb-0 font-bold text-base"
    >
      Test
    </div>
  </div>

  <div class="bg-white h-[57px] flex items-center justify-center">
    <a
      [routerLink]="['/', gameOperation.path]"
      [title]="gameOperation.name"
      class="
        font-bold
        text-black
        leading-[17px]
        text-sm
        px-5
        py-2.5
        border
        bg-white
        hover:bg-fb-gray-200
        border-fb-gray-600
        rounded-[5px]
        cursor-pointer
      "
    >
      Zum Spielbetrieb
    </a>
  </div>
</div>
