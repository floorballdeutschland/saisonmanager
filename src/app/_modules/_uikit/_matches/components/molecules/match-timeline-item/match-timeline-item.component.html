<li class="relative xl:flex xl:flex-1 xl:h-full">
  <div class="group flex w-full items-center focus-visible:outline-0">
    <span class="flex items-center px-6 py-3 text-sm font-medium">
      <span
        class="relative flex h-6 w-6 flex-shrink-0 items-center justify-center rounded-full border-2"
        [ngClass]="{
          'bg-indigo-600 group-hover:bg-indigo-800 border-0':
            periodActive === -1 || (periodActive === 0 && game.ended),
          'border-indigo-600': periodActive <= 0,
          'after:w-full after:absolute after:rounded-full after:animate-ping after:h-full after:bg-indigo-400 after:transparent-8 after:-z-1':
            periodActive === 0 && !game.ended,
          'border-gray-300 group-hover:border-gray-400': periodActive === 1,
        }"
      >
        <!-- Heroicon name: solid/check -->
        @if (periodActive === -1 || (periodActive === 0 && game.ended)) {
          <svg
            class="h-4 w-4 text-white"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              d="M19.916 4.626a.75.75 0 01.208 1.04l-9 13.5a.75.75 0 01-1.154.114l-6-6a.75.75 0 011.06-1.06l5.353 5.353 8.493-12.739a.75.75 0 011.04-.208z"
              clip-rule="evenodd"
            />
          </svg>
        } @else {
          <span
            class="text-xs my-auto"
            [ngClass]="{
              'text-indigo-600': periodActive !== 1,
              'text-gray-500': periodActive === 1,
            }"
            >{{ gamePeriodOption.short_title }}</span
          >
        }
      </span>
      <span
        class="ml-4 text-sm font-medium"
        [ngClass]="{
          'text-indigo-600': periodActive !== 1,
          'text-gray-900': periodActive === 1,
        }"
        >{{ gamePeriodOption.title }}</span
      >
    </span>
  </div>

  <!-- Arrow separator for lg screens and up -->
  @if (!last) {
    <div
      class="absolute top-0 right-0 hidden h-full w-5 xl:block"
      aria-hidden="true"
    >
      <svg
        class="h-full w-full text-gray-300"
        viewBox="0 0 22 80"
        fill="none"
        preserveAspectRatio="none"
      >
        <path
          d="M0 -2L20 40L0 82"
          vector-effect="non-scaling-stroke"
          stroke="currentcolor"
          stroke-linejoin="round"
        />
      </svg>
    </div>
  }
</li>
