<a
  class="
    flex flex-col
    items-center
    justify-center
    px-3
    pb-1
    pt-4
    transform
    hover:scale-105 hover:bg-fb-gray-200
    transition
  "
  [routerLink]="routerPrefix.concat([match.game_id.toString()])"
>
  <div class="text-xs text-fb-gray-400">{{ match.date | date }}</div>
  <div class="grid grid-cols-3 items-center justify-items-center my-2">
    <div class="w-[42px] h-[42px]">
      <img
        *ngIf="match.home_team_small_logo; else fallback"
        [src]="match.home_team_small_logo"
        class="w-full h-full object-contain"
      />
    </div>

    <div class="text-center text-sm text-fb-gray-500 font-bold w-[75px]">
      <ng-container *ngIf="match.state === 'no_record'">
        <p class="text-base whitespace-nowrap" *ngIf="match.time">
          {{ match.time }} Uhr
        </p>
        <p class="text-xs leading-3" *ngIf="!match.time">k.A.</p>
      </ng-container>
      <ng-container *ngIf="match.state !== 'no_record'">
        <p class="text-2xl" *ngIf="!match.result_string">- : -</p>
        <ng-container
          *ngIf="match.result_string | normalizeMatchResult as resultData"
        >
          <p *ngIf="resultData.result" class="text-2xl">
            {{ resultData.result }}
          </p>
          <p *ngIf="resultData.extraTime" class="text-xs">
            {{ resultData.extraTime }}
          </p>
        </ng-container>
      </ng-container>
    </div>

    <div class="w-[42px] h-[42px]">
      <img
        *ngIf="match.guest_team_small_logo; else fallback"
        [src]="match.guest_team_small_logo"
        class="w-full h-full object-contain"
      />
    </div>
  </div>

  <div class="text-xs text-fb-gray-400">{{ match.arena_address }}</div>
</a>

<ng-template #fallback>
  <svg
    aria-hidden="true"
    focusable="false"
    data-prefix="fas"
    data-icon="shield-alt"
    class="text-fb-gray-400 p-0.5"
    role="img"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 512 512"
  >
    <path
      fill="currentColor"
      d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM256.1 446.3l-.1-381 175.9 73.3c-3.3 151.4-82.1 261.1-175.8 307.7z"
    ></path>
  </svg>
</ng-template>
