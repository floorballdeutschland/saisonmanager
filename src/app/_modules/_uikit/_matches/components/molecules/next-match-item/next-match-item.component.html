<a
  class="md:flex flex-col items-center justify-center p-3 transform hover:scale-105 hover:bg-fb-gray-200 transition max-w-[80vw] md:max-w-none"
  [routerLink]="routerPrefix.concat([match.game_id.toString()])"
>
  <div
    class="grid grid-cols-[1fr,auto] grid-rows-2 gap-x-[10px] gap-y-[5px] md:grid-rows-1 md:grid-cols-3 items-center md:justify-items-center my-2"
  >
    <div
      class="grid grid-cols-[32px,1fr] md:grid-cols-1 gap-3 row-start-1 items-center"
    >
      <div class="w-[32px] h-[32px] md:w-[42px] md:h-[42px]">
        <img
          *ngIf="match.home_team_small_logo; else fallback"
          [src]="match.home_team_small_logo"
          class="w-full h-full object-contain"
        />
      </div>
      <p clasS="md:hidden text-sm font-bold whitespace-nowrap truncate">
        {{ match.home_team_name }}
      </p>
    </div>

    <div class="text-center text-sm text-fb-gray-500 font-bold w-[75px]">
      <ng-container *ngIf="!match.started">
        <p class="text-base whitespace-nowrap" *ngIf="match.time">
          {{ match.time }} Uhr
        </p>
        <p class="text-xs leading-3" *ngIf="!match.time">k.A.</p>
      </ng-container>
      <ng-container *ngIf="match.started">
        <ng-container *ngIf="match.result | normalizeMatchResult as resultData">
          <p
            *ngIf="resultData.result"
            class="text-2xl"
            [ngClass]="{
              'text-pink-500 animate-pulse': match.started && !match.ended
            }"
          >
            {{ resultData.result }}
          </p>
          <p
            *ngIf="resultData.extraTime"
            class="text-xs"
            [ngClass]="{
              'text-pink-500 animate-pulse': match.started && !match.ended
            }"
          >
            {{ resultData.extraTime }}
          </p>
        </ng-container>
      </ng-container>
    </div>

    <div
      class="grid grid-cols-[32px,1fr] md:grid-cols-1 gap-3 row-start-2 md:row-start-1 items-center"
    >
      <div class="w-[32px] h-[32px] md:w-[42px] md:h-[42px]">
        <img
          *ngIf="match.guest_team_small_logo; else fallback"
          [src]="match.guest_team_small_logo"
          class="w-full h-full object-contain"
        />
      </div>
      <p clasS="md:hidden text-sm font-bold whitespace-nowrap truncate">
        {{ match.guest_team_name }}
      </p>
    </div>
  </div>

  <div class="text-xs text-fb-gray-400 hidden md:block">
    {{ match.arena_address }}
  </div>
</a>

<ng-template #fallback>
  <svg
    aria-hidden="true"
    focusable="false"
    data-prefix="fas"
    data-icon="shield-alt"
    class="text-fb-gray-400 p-0.5"
    role="img"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 512 512"
  >
    <path
      fill="currentColor"
      d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM256.1 446.3l-.1-381 175.9 73.3c-3.3 151.4-82.1 261.1-175.8 307.7z"
    ></path>
  </svg>
</ng-template>
