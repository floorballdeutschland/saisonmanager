<a
  [routerLink]="['./', 'spiel', match.game_id]"
  class="
    grid grid-cols-[1fr,42px,80px,42px,1fr]
    gap-5
    items-center
    h-20
    cursor-pointer
    hover:bg-fb-gray-200
    transition
  "
>
  <div class="text-right text-sm font-bold">
    {{ match.home_team_name }}
  </div>
  <div>
    <img
      [src]="match.home_team_small_logo"
      class="h-full w-full object-contain"
    />
  </div>

  <div class="text-center font-bold tracking-widest grid grid-cols-1">
    <ng-container *ngIf="match.state === 'no_record'">
      <p class="text-base whitespace-nowrap" *ngIf="match.time">
        {{ match.time }} Uhr
      </p>
      <p class="text-xs leading-3" *ngIf="!match.time">
        Keine Uhrzeit angegeben
      </p>
    </ng-container>
    <ng-container *ngIf="match.state !== 'no_record'">
      <p class="text-2xl" *ngIf="!match.result_string">- : -</p>
      <ng-container
        *ngIf="match.result_string | normalizeMatchResult as resultData"
      >
        <p *ngIf="resultData.result" class="text-2xl">
          {{ resultData.result }}
        </p>
        <p *ngIf="resultData.extraTime" class="text-xs">
          {{ resultData.extraTime }}
        </p>
      </ng-container>
    </ng-container>
  </div>

  <div>
    <img
      [src]="match.guest_team_small_logo"
      class="h-full w-full object-contain"
    />
  </div>
  <div class="text-sm font-bold">{{ match.guest_team_name }}</div>
</a>
