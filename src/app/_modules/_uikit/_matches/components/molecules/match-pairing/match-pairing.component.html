<a
  [routerLink]="['./', 'spiel', match.game_id]"
  class="
    grid grid-cols-[1fr,42px,80px,42px,1fr]
    gap-5
    items-center
    h-20
    cursor-pointer
    hover:bg-fb-gray-200
    transition
  "
>
  <div class="text-right text-sm font-bold">
    {{ match.home_team_name }}
  </div>
  <div>
    <img
      [src]="match.home_team_small_logo"
      class="h-full w-full object-contain"
    />
  </div>

  <div class="text-center font-bold text-2xl tracking-widest">
    {{ match.result_string ?? "- : -" }}
  </div>

  <div>
    <img
      [src]="match.guest_team_small_logo"
      class="h-full w-full object-contain"
    />
  </div>
  <div class="text-sm font-bold">{{ match.guest_team_name }}</div>
</a>
