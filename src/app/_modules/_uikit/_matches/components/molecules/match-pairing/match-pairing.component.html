<a
  [routerLink]="['./', 'spiel', match.game_id]"
  class="grid grid-cols-[42px,1fr,100px] md:grid-cols-[1fr,42px,80px,42px,1fr] grid-rows-[40px,40px] md:grid-rows-1 md:gap-x-5 items-center md:h-20 cursor-pointer hover:bg-fb-gray-200 transition my-4 md:my-0"
>
  <div class="md:text-right text-sm font-bold order-2 md:order-1">
    {{ match.home_team_name }}
  </div>
  <div class="order-1 md:order-2 pr-3 md:pr-0">
    <img
      *ngIf="match.home_team_small_logo; else fallback"
      [src]="match.home_team_small_logo"
      class="h-8 md:h-full w-full object-contain"
    />
  </div>

  <div
    class="order-3 row-span-2 md:order-3 text-center font-bold tracking-widest md:grid md:grid-cols-1"
  >
    <ng-container *ngIf="!match.started">
      <p class="text-base whitespace-nowrap" *ngIf="match.time">
        {{ match.time }} Uhr
      </p>
      <p class="text-xs leading-3" *ngIf="!match.time">
        Keine Uhrzeit angegeben
      </p>
    </ng-container>
    <ng-container *ngIf="match.started">
      <ng-container *ngIf="match.result | normalizeMatchResult as resultData">
        <p
          *ngIf="resultData.result"
          class="text-2xl"
          [ngClass]="{
            'bg-pink-500 animate-pulse': match.started && !match.ended
          }"
        >
          {{ resultData.result }}
        </p>
        <p
          *ngIf="resultData.extraTime"
          class="text-xs"
          [ngClass]="{
            'bg-pink-500 animate-pulse': match.started && !match.ended
          }"
        >
          {{ resultData.extraTime }}
        </p>
      </ng-container>
    </ng-container>
  </div>

  <div class="order-3 md:order-4 pr-3 md:pr-0">
    <img
      *ngIf="match.guest_team_small_logo; else fallback"
      [src]="match.guest_team_small_logo"
      class="h-8 md:h-full w-full object-contain"
    />
  </div>
  <div class="text-sm font-bold order-3 md:order-5">
    {{ match.guest_team_name }}
  </div>
</a>

<ng-template #fallback>
  <svg
    aria-hidden="true"
    focusable="false"
    data-prefix="fas"
    data-icon="shield-alt"
    class="text-fb-gray-400 p-0.5"
    role="img"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 512 512"
  >
    <path
      fill="currentColor"
      d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM256.1 446.3l-.1-381 175.9 73.3c-3.3 151.4-82.1 261.1-175.8 307.7z"
    ></path>
  </svg>
</ng-template>
