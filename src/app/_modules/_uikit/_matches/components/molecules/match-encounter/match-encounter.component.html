<a
  [routerLink]="['spiel', match.game_id.toString()] | routeMerge: baseRoute"
  class="
    grid grid-cols-[42px,1fr,80px]
    md:grid-cols-[1fr,1fr,42px,80px,42px,1fr,1fr]
    grid-rows-[30px,40px,40px]
    md:grid-rows-1
    gap-2
    md:gap-5
    items-center
    md:h-20
    px-2.5
    md:px-5
    cursor-pointer
    hover:bg-fb-gray-200
    transition
    my-4
    md:my-0
  "
>
  <div
    class="
      text-fb-gray-400 text-sm
      col-span-3
      md:col-span-1
      order-1
      text-center
      md:text-left
    "
  >
    {{ match.date | date }} - {{ match.time }} Uhr
  </div>
  <div class="md:text-right text-sm font-bold order-3 md:order-2">
    {{ match.home_team_name }}
  </div>
  <div class="order-1 md:order-2">
    <img
      *ngIf="match.home_team_small_logo; else fallback"
      [src]="match.home_team_small_logo"
      class="h-8 md:h-full w-full object-contain"
    />
  </div>

  <div
    class="
      text-center
      font-bold
      tracking-widest
      order-4
      row-span-2
      md:row-span-1
    "
  >
    <ng-container *ngIf="match.state === 'no_record'">
      <p class="text-base whitespace-nowrap" *ngIf="match.time">
        {{ match.time }} Uhr
      </p>
      <p class="text-xs leading-3" *ngIf="!match.time">
        Keine Uhrzeit angegeben
      </p>
    </ng-container>
    <ng-container *ngIf="match.state !== 'no_record'">
      <p class="text-2xl" *ngIf="!match.result_string">- : -</p>
      <ng-container
        *ngIf="match.result_string | normalizeMatchResult as resultData"
      >
        <p *ngIf="resultData.result" class="text-2xl">
          {{ resultData.result }}
        </p>
        <p *ngIf="resultData.extraTime" class="text-sm">
          {{ resultData.extraTime }}
        </p>
      </ng-container>
    </ng-container>
  </div>

  <div class="order-5">
    <img
      *ngIf="match.guest_team_small_logo; else fallback"
      [src]="match.guest_team_small_logo"
      class="h-8 md:h-full w-full object-contain"
    />
  </div>
  <div class="text-sm font-bold order-6">{{ match.guest_team_name }}</div>
  <div
    class="
      text-center
      md:text-right
      text-fb-gray-400 text-sm
      col-span-3
      md:col-span-1
      order-7
      pb-2
      md:pb-0
    "
  >
    {{ match.arena_short }}
  </div>
</a>

<ng-template #fallback>
  <svg
    aria-hidden="true"
    focusable="false"
    data-prefix="fas"
    data-icon="shield-alt"
    class="text-fb-gray-400 p-0.5"
    role="img"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 512 512"
  >
    <path
      fill="currentColor"
      d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM256.1 446.3l-.1-381 175.9 73.3c-3.3 151.4-82.1 261.1-175.8 307.7z"
    ></path>
  </svg>
</ng-template>
