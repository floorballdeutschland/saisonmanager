<div class="flex justify-center p-[45px] border-b-[10px] border-fb-gray-200">
  <div class="grid gap-4 grid-cols-3">
    <div class="flex flex-col justify-end h-[160px]">
      <img
        class="w-full h-full object-contain"
        [src]="game.home_team_logo"
        [alt]="game.home_team_name"
        [title]="'Logo: ' + game.home_team_name"
      />
    </div>
    <div
      class="
        flex flex-col
        content-center
        justify-center
        text-center
        max-w-[282px]
      "
    >
      <span class="block text-base text-fb-gray-400 font-bold"
        ><i>{{ game.date | date: "dd.MM.YYYY" }}</i>
        {{ game.start_time ? game.start_time + " Uhr" : "-" }}</span
      >
      <span class="block text-4.5xl font-bold"
        >{{ game.result.home_goals }} : {{ game.result.guest_goals }}</span
      >
      <ul class="grid grid-cols-3 row justify-center gap-3">
        <ng-container
          *ngFor="
            let periodResult of game.result.home_goals_period;
            let i = index
          "
        >
          <li class="text-black text-base font-bold">
            {{ periodResult }} : {{ game.result.guest_goals_period[i] }}
          </li>
        </ng-container>
      </ul>
    </div>
    <div class="flex flex-col justify-start h-[160px]">
      <img
        class="w-full h-full object-contain"
        [src]="game.guest_team_logo"
        [alt]="game.guest_team_name"
        [title]="'Logo: ' + game.guest_team_name"
      />
    </div>
  </div>
</div>
