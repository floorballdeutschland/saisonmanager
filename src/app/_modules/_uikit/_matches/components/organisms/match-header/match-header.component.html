<div
  class="flex justify-center px-2 py-[30px] md:p-[45px] border-b-[10px] border-fb-gray-200"
>
  <div class="grid gap-4 grid-cols-3 items-center">
    <div class="flex flex-col justify-end h-[90px] md:h-[160px]">
      <img
        *ngIf="game.home_team_logo; else fallback"
        class="w-full h-full object-contain"
        [src]="game.home_team_logo"
        [alt]="game.home_team_name"
        [title]="'Logo: ' + game.home_team_name"
      />
    </div>
    <div
      class="grid grid-cols-1 gap-3 content-center justify-center text-center max-w-[300px] md:min-w-[250px]"
    >
      <p
        class="flex md:block text-base font-bold justify-center whitespace-nowrap md:whitespace-normal"
        [ngClass]="{ 'text-fb-gray-400': game.started && game.ended }"
      >
        <ng-container *ngIf="game.started && !game.ended; else gameDate">
          <div
            class="uppercase bg-pink-500 text-sm text-white inline-block mx-auto rounded px-2"
          >
            Live
          </div>
        </ng-container>
        <ng-template #gameDate>
          {{ game.date | date: "dd.MM.YYYY" }}
          <ng-container *ngIf="game.start_time">
            – {{ game.start_time }} Uhr
          </ng-container>
        </ng-template>
      </p>
      <div
        *ngIf="game.result_string && game.started"
        [ngClass]="{
          'animate-pulse text-pink-500': game.started && !game.ended
        }"
      >
        <ng-container *ngIf="game.result | normalizeMatchResult as resultData">
          <p
            *ngIf="resultData.result"
            class="text-4.5xl font-bold leading-none whitespace-nowrap"
          >
            {{ resultData.result }}
          </p>
          <p
            *ngIf="resultData.extraTime"
            class="text-lg leading-none whitespace-nowrap"
          >
            {{ resultData.extraTime }}
          </p>
        </ng-container>
      </div>
      <ul
        class="flex justify-center gap-5 whitespace-nowrap md:whitespace-normal"
        *ngIf="game.result && game.started"
      >
        <ng-container
          *ngFor="
            let periodResult of game.result.home_goals_period;
            let isLast = last;
            let i = index
          "
        >
          <li
            class="text-black text-base font-bold"
            *ngIf="!isLast || (game.result.overtime && isLast)"
          >
            {{ periodResult }} : {{ game.result.guest_goals_period?.[i] }}
          </li>
        </ng-container>
      </ul>
      <div *ngIf="!game.started" class="text-fb-gray-400">
        <div>{{ game.arena_name }}</div>
        <div>{{ game.arena_address }}</div>
      </div>
    </div>
    <div class="flex flex-col justify-start h-[90px] md:h-[160px]">
      <img
        *ngIf="game.guest_team_logo; else fallback"
        class="w-full h-full object-contain"
        [src]="game.guest_team_logo"
        [alt]="game.guest_team_name"
        [title]="'Logo: ' + game.guest_team_name"
      />
    </div>
  </div>
</div>

<ng-template #fallback>
  <svg
    aria-hidden="true"
    focusable="false"
    data-prefix="fas"
    data-icon="shield-alt"
    class="text-fb-gray-400 p-0.5"
    role="img"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 512 512"
  >
    <path
      fill="currentColor"
      d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM256.1 446.3l-.1-381 175.9 73.3c-3.3 151.4-82.1 261.1-175.8 307.7z"
    ></path>
  </svg>
</ng-template>
