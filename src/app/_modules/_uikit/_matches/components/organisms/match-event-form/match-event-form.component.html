<div
  class="relative grid grid-cols-2 gap-3 p-4 bg-fb-gray-200"
  [ngClass]="
    team !== undefined
      ? team === 'home'
        ? 'before:block before:absolute before:top-0 before:left-1/4 before:w-6 before:h-6 before:bg-gray-200 before:-translate-y-full before:-translate-x-full before:origin-bottom-left before:rotate-45'
        : 'before:block before:absolute before:top-0 before:left-3/4 before:w-6 before:h-6 before:bg-gray-200 before:-translate-y-full before:-translate-x-1/2 before:origin-bottom-left before:rotate-45'
      : ''
  "
>
  <div class="col-span-2">
    <label class="font-medium text-base text-fb-gray-500">Spielabschnitt</label>
    <select class="w-full p-2 border border-fb-gray-600 rounded-[5px]">
      <option value="">1. Drittel</option>
      <option value="">2. Drittel</option>
      <option value="">3. Drittel</option>
      <option value="">Verlängerung</option>
    </select>
  </div>

  <div>
    <label class="font-medium text-base text-fb-gray-500">Minuten</label>
    <input class="w-full p-2 border border-fb-gray-600 rounded-[5px]" />
  </div>
  <div>
    <label class="font-medium text-base text-fb-gray-500">Sekunden</label>
    <input class="w-full p-2 border border-fb-gray-600 rounded-[5px]" />
  </div>

  <ng-container *ngIf="type !== 'timeout'">
    <div class="col-span-2">
      <label class="font-medium text-base text-fb-gray-500">Torschütze</label>
      <select class="w-full p-2 border border-fb-gray-600 rounded-[5px]">
        <option value="">Spieler 1</option>
        <option value="">Spieler 2</option>
        <option value="">Spieler 3</option>
        <option value="">Spieler 4</option>
        <option value="">Spieler 5</option>
      </select>
    </div>

    <ng-container *ngIf="type === 'goal'">
      <div class="col-span-2">
        <label class="font-medium text-base text-fb-gray-500">Assist</label>
        <select class="w-full p-2 border border-fb-gray-600 rounded-[5px]">
          <option value="">Spieler 1</option>
          <option value="">Spieler 2</option>
          <option value="">Spieler 3</option>
          <option value="">Spieler 4</option>
          <option value="">Spieler 5</option>
        </select>
      </div>
    </ng-container>

    <ng-container *ngIf="type === 'penalty'">
      <div class="col-span-2">
        <label class="font-medium text-base text-fb-gray-500">Strafe</label>
        <select class="w-full p-2 border border-fb-gray-600 rounded-[5px]">
          <option value="2">2 Min.</option>
          <option value="2+2">2 + 2 Min.</option>
          <option value="10">10 Min.</option>
          <option value="MS1">MS I</option>
          <option value="MS2">MS II</option>
        </select>
      </div>

      <div class="col-span-2">
        <label class="font-medium text-base text-fb-gray-500">Strafcode</label>
        <select class="w-full p-2 border border-fb-gray-600 rounded-[5px]">
          <option value="901">901 - Stockschlag</option>
          <option value="901">901 - Stockschlag</option>
          <option value="901">901 - Stockschlag</option>
          <option value="901">901 - Stockschlag</option>
          <option value="901">901 - Stockschlag</option>
        </select>
      </div>
    </ng-container>
  </ng-container>
</div>
