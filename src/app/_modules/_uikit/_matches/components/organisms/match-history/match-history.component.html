<div>
  <div
    class="text-center text-fb-gray-400 my-12"
    *ngIf="!match.events || match.events.length === 0"
  >
    Noch keine Ereignisse vorhanden
  </div>

  <ng-container
    *ngFor="
      let period of match.period_titles
        | onlyRunning
        | reversePeriods: newestFirst;
      let index = index
    "
  >
    <ng-container
      *ngIf="match.events | matchEvents: period.period:newestFirst as events"
    >
      <ng-container *ngIf="events.length">
        <div class="font-bold w-full border-b border-fb-gray-200 pb-5 mt-8">
          {{ period.title }}
        </div>

        <fb-match-history-item
          class="block even:bg-fb-gray-300"
          *ngFor="
            let event of match.events | matchEvents: period.period:newestFirst;
            let isLast = last
          "
          [allowCancel]="allowCancel"
          [isLast]="isLast"
          [match]="match"
          [event]="event"
          (reloadGame)="handleReload()"
        ></fb-match-history-item>
      </ng-container>
    </ng-container>
  </ng-container>
</div>
