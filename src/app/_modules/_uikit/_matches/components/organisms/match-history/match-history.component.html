<div>
  <div
    class="text-center text-fb-gray-400 my-12"
    *ngIf="
      (!match.events || match.events.length === 0) &&
      !(match.period_titles | onlyRunning).length
    "
  >
    Noch keine Ereignisse vorhanden
  </div>

  <ng-container
    *ngFor="
      let periodObject of match.period_titles
        | onlyRunning
        | reversePeriods : newestFirst;
      let index = index
    "
  >
    <ng-container
      *ngIf="
        match.events
          | filterPeriodEvents : periodObject.period
          | reverseEvents : newestFirst as events
      "
    >
      <ng-container *ngIf="events.length; else noEvents">
        <div class="font-bold w-full border-b border-fb-gray-200 pb-5 mt-8">
          {{ periodObject.title }}
        </div>

        <fb-match-history-item
          class="block even:bg-fb-gray-300"
          *ngFor="let event of events; let isLast = last"
          [allowCancel]="allowCancel"
          [showTrikotNumber]="showTrikotNumber"
          [isLast]="isLast"
          [match]="match"
          [event]="event"
          [additionalFields]="additionalFields"
          [penalties]="penalties"
          [penaltyCodes]="penaltyCodes"
          (reloadGame)="handleReload()"
        ></fb-match-history-item>
      </ng-container>
      <ng-template #noEvents>
        <ng-container *ngIf="!periodObject.optional">
          <div class="font-bold w-full border-b border-fb-gray-200 pb-5 mt-8">
            {{ periodObject.title }}
          </div>
          <div class="text-fb-gray-400 py-4">Keine Ereignisse</div>
        </ng-container>
      </ng-template>
    </ng-container>
  </ng-container>
</div>
