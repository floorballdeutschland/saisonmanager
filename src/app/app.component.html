<ng-container *ngIf="(isLoading$ | async) === false">
  <div class="grid grid-cols-[300px,1fr]">
    <div class="hidden md:block h-full w-full">
      <fb-sidebar>
        <fb-league-navigation
          *ngIf="leagues$ | async as leagues"
          [leagues]="leagues"
          [selectedAssociation]="selectedAssociation$ | async"
        ></fb-league-navigation>
      </fb-sidebar>
    </div>
    <div class="h-screen overflow-y-auto">
      <router-outlet></router-outlet>
    </div>
  </div>
</ng-container>
