name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npx ng lint

      - name: Test
        run: npx ng test --no-watch --no-progress --browsers=ChromeHeadlessCI

      - name: Build
        run: npm run build
