version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@schematics/angular"
          - "zone.js"
          - "rxjs"
          - "tslib"
      eslint:
        patterns:
          - "@angular-eslint/*"
          - "@typescript-eslint/*"
          - "eslint"
          - "eslint-*"
      sentry:
        patterns:
          - "@sentry/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss*"
