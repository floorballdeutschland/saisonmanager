# Dependabot ist auf "nur Security-Updates" gestellt:
# open-pull-requests-limit: 0 deaktiviert die regulären Versions-Update-PRs.
# Dependabot Security Updates (per GitHub-Repo-Setting aktiviert) sind von
# diesem Limit ausgenommen und öffnen weiterhin PRs für Sicherheitslücken.
# Die groups/commit-message-Einstellungen bleiben dokumentiert, falls
# Versions-Updates später wieder aktiviert werden (Limit > 0).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    commit-message:
      prefix: chore
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@schematics/angular"
          - "zone.js"
          - "rxjs"
          - "tslib"
      eslint:
        patterns:
          - "@angular-eslint/*"
          - "@typescript-eslint/*"
          - "eslint"
          - "eslint-*"
      sentry:
        patterns:
          - "@sentry/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss*"
